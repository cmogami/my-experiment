<!DOCTYPE html>
<html>
<head>
  <title>jsPsych Red Circle Task</title>
  <!-- Load jsPsych core and CSS -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
  <style>
    /* Requirement 1: Background color gray */
    body {
      background-color: #808080;
      color: white; /* Make text readable on gray background */
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Requirement 2: 100px red circle using CSS */
    .red-circle {
      width: 100px;
      height: 100px;
      background-color: #ff0000;
      border-radius: 50%;
      margin: 0 auto;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    .message {
      margin-top: 20px;
      font-family: sans-serif;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <script>
    /**
     * jsPsych v7 experiment
     * Specifications:
     * - Gray background
     * - 100px red circle at center
     * - Ends on space key press
     */

    const jsPsych = initJsPsych({
      on_finish: function() {
        // Optional: show data in console
        console.log("Experiment finished");
      }
    });

    // Requirement 2 & 3: Display red circle until space key is pressed
    const trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="red-circle"></div>
        <div class="message">スペースキーを押して終了してください</div>
      `,
      choices: [' '], // Requirement 3: Listen for space key
      data: {
        component: 'red_circle_task'
      }
    };

    // Requirement 4: Show finish message
    const finish_screen = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="message">終了しました。ご協力ありがとうございました。</div>
      `,
      choices: "NO_KEYS",
      trial_duration: 2000 // Display for 2 seconds before ending
    };

    // Run timeline
    jsPsych.run([trial, finish_screen]);
  </script>
</body>
</html>
