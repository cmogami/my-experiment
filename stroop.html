<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroop Task - jsPsych</title>
    <!-- jsPsych v7.3 の読み込み -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        body {
            background-color: #FFFFFF;
            color: #333;
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            user-select: none;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #jspsych-target {
            width: 100%;
            height: 100%;
        }
        .jspsych-content {
            font-size: 24px;
        }
        .stimulus {
            font-size: 60px;
            font-weight: bold;
        }
        /* 送信メッセージ用スタイル */
        .sync-message {
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="jspsych-target"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 指定されたGASのURL
            const GAS_URL = "https://script.google.com/macros/s/1rRaKnPIbnz6V_UbHrMB6F_OrRz0KiCbw5qWo6Dh8R34/exec";

            /**
             * jsPsychの初期化
             */
            const jsPsych = initJsPsych({
                display_element: 'jspsych-target',
                on_finish: function() {
                    sendDataToGas();
                }
            });

            const timeline = [];

            /**
             * 1. 参加者情報入力 (survey-text)
             */
            const participant_info = {
                type: jsPsychSurveyText,
                questions: [
                    {prompt: '参加者ID（例：学籍番号）を入力してください:', name: 'subject_id', required: true}
                ],
                button_label: '次へ',
                on_finish: function(data) {
                    // 全試行に共通して付与されるデータを設定
                    const id = data.response.subject_id;
                    jsPsych.data.addProperties({
                        subject_id: id,
                        timestamp: new Date().toISOString()
                    });
                }
            };
            timeline.push(participant_info);

            /**
             * 2. 教示画面
             */
            const instructions = {
                type: jsPsychHtmlKeyboardResponse,
                stimulus: `
                    <div style="text-align: left; line-height: 1.6;">
                        <p>文字の<strong>「色」</strong>をキーボードで答えてください。</p>
                        <p>・<span style="color:red">赤色</span>なら <strong>'r'</strong></p>
                        <p>・<span style="color:blue">青色</span>なら <strong>'b'</strong></p>
                        <p>・<span style="color:green">緑色</span>なら <strong>'g'</strong></p>
                        <br>
                        <p style="text-align: center;">スペースキーで開始します。</p>
                    </div>
                `,
                choices: [' '],
                post_trial_gap: 1000
            };
            timeline.push(instructions);

            /**
             * 3. 刺激の定義
             */
            const stimuli_pool = [
                { text: "赤", color: "red", condition: "congruent", correct_key: "r" },
                { text: "青", color: "blue", condition: "congruent", correct_key: "b" },
                { text: "緑", color: "green", condition: "congruent", correct_key: "g" },
                { text: "赤", color: "blue", condition: "incongruent", correct_key: "b" },
                { text: "赤", color: "green", condition: "incongruent", correct_key: "g" },
                { text: "青", color: "red", condition: "incongruent", correct_key: "r" },
                { text: "青", color: "green", condition: "incongruent", correct_key: "g" },
                { text: "緑", color: "red", condition: "incongruent", correct_key: "r" },
                { text: "緑", color: "blue", condition: "incongruent", correct_key: "b" }
            ];

            // a. 注視点 (500ms)
            const fixation = {
                type: jsPsychHtmlKeyboardResponse,
                stimulus: '<div style="font-size: 60px;">+</div>',
                choices: "NO_KEYS",
                trial_duration: 500,
                data: { task: 'fixation' }
            };

            // b. 刺激提示 (r, b, gキー)
            const test_trial = {
                type: jsPsychHtmlKeyboardResponse,
                stimulus: function() {
                    const text = jsPsych.timelineVariable('text');
                    const color = jsPsych.timelineVariable('color');
                    return `<div class="stimulus" style="color: ${color}">${text}</div>`;
                },
                choices: ['r', 'b', 'g'],
                data: {
                    task: 'response',
                    word: jsPsych.timelineVariable('text'),
                    color: jsPsych.timelineVariable('color'),
                    condition: jsPsych.timelineVariable('condition'),
                    correct_response: jsPsych.timelineVariable('correct_key')
                },
                on_finish: function(data) {
                    // 正誤判定を論理値として確実に記録
                    data.correct = (data.response === data.correct_response);
                }
            };

            /**
             * 4. メイン試行ループ (10試行, ITI 1000ms)
             */
            const main_procedure = {
                timeline: [fixation, test_trial],
                timeline_variables: stimuli_pool,
                sample: {
                    type: 'with-replacement',
                    size: 10
                },
                post_trial_gap: 1000
            };
            timeline.push(main_procedure);

            /**
             * 5. データ送信処理 (GAS)
             */
            async function sendDataToGas() {
                const display = jsPsych.getDisplayElement();
                display.innerHTML = '<div class="sync-message"><h3>データを送信中...</h3><p>ブラウザを閉じないでお待ちください。</p></div>';

                // 分析対象（response）のデータのみ抽出・整形
                const relevant_data = jsPsych.data.get()
                    .filter({task: 'response'})
                    .ignore('stimulus')
                    .ignore('trial_type')
                    .ignore('trial_index')
                    .ignore('internal_node_id')
                    .values();

                // 指数バックオフを伴うリトライ関数
                const upload = async (retries = 5, delay = 1000) => {
                    try {
                        await fetch(GAS_URL, {
                            method: "POST",
                            mode: "no-cors",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify(relevant_data)
                        });
                        
                        // 成功メッセージ
                        display.innerHTML = '<div class="sync-message"><h3>実験完了</h3><p>データは正常に保存されました。ご協力ありがとうございました。</p></div>';
                    } catch (error) {
                        if (retries > 0) {
                            // エラー時に待機時間を倍にしてリトライ
                            setTimeout(() => upload(retries - 1, delay * 2), delay);
                        } else {
                            // 最終的なエラー表示
                            display.innerHTML = '<div class="sync-message"><h3>エラー</h3><p>データの送信に失敗しました。この画面をスクリーンショットして管理者に連絡してください。</p></div>';
                            console.error("Upload failed after retries:", error);
                        }
                    }
                };

                await upload();
            }

            // 実験の実行
            jsPsych.run(timeline);
        });
    </script>
</body>
</html>
