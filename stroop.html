<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroop Task - Data Collection</title>
    <!-- jsPsych v7.3 の読み込み (CDN) -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        body {
            background-color: #FFFFFF;
            color: #333;
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            user-select: none;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #jspsych-target {
            width: 100%;
            height: 100%;
        }
        .jspsych-content {
            font-size: 24px;
        }
        .stimulus {
            font-size: 60px;
            font-weight: bold;
        }
        .loading-msg {
            text-align: center;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div id="jspsych-target"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const GAS_URL = "https://script.google.com/macros/s/AKfycbzu6mi8N8kSWZ1u6GVroOkHk3aGGjWLeGcnjoLxAn-xHwDnQgf83Frh8w5I9YDsgkeKCg/exec";

            /**
             * jsPsychの初期化
             */
            const jsPsych = initJsPsych({
                display_element: 'jspsych-target',
                on_finish: function() {
                    processAndSendData();
                }
            });

            const timeline = [];

            /**
             * 1. 参加者情報入力 (IDの保持)
             */
            const participant_info = {
                type: jsPsychSurveyText,
                questions: [
                    {prompt: "参加者ID（例：学籍番号）を入力してください：", name: 'participant_id', required: true}
                ],
                button_label: "次へ",
                on_finish: function(data) {
                    const id = data.response.participant_id;
                    // 以降の全試行にIDと開始時刻を付与
                    jsPsych.data.addProperties({
                        subject_id: id,
                        timestamp: new Date().toLocaleString('ja-JP')
                    });
                }
            };
            timeline.push(participant_info);

            /**
             * 2. 教示画面
             */
            const instructions = {
                type: jsPsychHtmlKeyboardResponse,
                stimulus: `
                    <div style="text-align: left; line-height: 1.6;">
                        <p>文字の<strong>「色」</strong>をキーボードで答えてください。</p>
                        <p>・<span style="color:red">赤色</span>なら <strong>'r'</strong></p>
                        <p>・<span style="color:blue">青色</span>なら <strong>'b'</strong></p>
                        <p>・<span style="color:green">緑色</span>なら <strong>'g'</strong></p>
                        <br>
                        <p style="text-align: center;">スペースキーで開始します。</p>
                    </div>
                `,
                choices: [' '],
                post_trial_gap: 1000
            };
            timeline.push(instructions);

            /**
             * 3. 刺激の定義
             */
            const stimuli_pool = [
                { text: "赤", color: "red", condition: "congruent", correct_key: "r" },
                { text: "青", color: "blue", condition: "congruent", correct_key: "b" },
                { text: "緑", color: "green", condition: "congruent", correct_key: "g" },
                { text: "赤", color: "blue", condition: "incongruent", correct_key: "b" },
                { text: "赤", color: "green", condition: "incongruent", correct_key: "g" },
                { text: "青", color: "red", condition: "incongruent", correct_key: "r" },
                { text: "青", color: "green", condition: "incongruent", correct_key: "g" },
                { text: "緑", color: "red", condition: "incongruent", correct_key: "r" },
                { text: "緑", color: "blue", condition: "incongruent", correct_key: "b" }
            ];

            // 注視点 (500ms)
            const fixation = {
                type: jsPsychHtmlKeyboardResponse,
                stimulus: '<div style="font-size: 60px;">+</div>',
                choices: "NO_KEYS",
                trial_duration: 500,
                data: { task: 'fixation' }
            };

            // 刺激提示 (ITI 1000msはメインプロシージャのpost_trial_gapで管理)
            const test_trial = {
                type: jsPsychHtmlKeyboardResponse,
                stimulus: function() {
                    const text = jsPsych.timelineVariable('text');
                    const color = jsPsych.timelineVariable('color');
                    return `<div class="stimulus" style="color: ${color}">${text}</div>`;
                },
                choices: ['r', 'b', 'g'],
                data: {
                    task: 'response',
                    word: jsPsych.timelineVariable('text'),
                    color: jsPsych.timelineVariable('color'),
                    condition: jsPsych.timelineVariable('condition'),
                    correct_response: jsPsych.timelineVariable('correct_key')
                },
                on_finish: function(data) {
                    // 正誤判定を確実に記録 (true / false)
                    data.correct = (data.response === data.correct_response);
                }
            };

            /**
             * 試行ループ (10試行)
             */
            const main_procedure = {
                timeline: [fixation, test_trial],
                timeline_variables: stimuli_pool,
                sample: {
                    type: 'with-replacement',
                    size: 10
                },
                post_trial_gap: 1000 // ITI
            };
            timeline.push(main_procedure);

            /**
             * データの整形と送信処理
             */
            async function processAndSendData() {
                const displayElement = jsPsych.getDisplayElement();
                displayElement.innerHTML = '<div class="loading-msg">データを送信中...<br>ブラウザを閉じないでください。</div>';

                // 1. 必要な行（response）のみを抽出
                const rawData = jsPsych.data.get().filter({task: 'response'}).values();
                
                // 2. 必要な列のみを抽出・整形
                const cleanData = rawData.map(trial => ({
                    subject_id: trial.subject_id,
                    timestamp: trial.timestamp,
                    word: trial.word,
                    color: trial.color,
                    condition: trial.condition,
                    rt: trial.rt,
                    correct: trial.correct // true or false
                }));

                // 3. 送信実行（指数バックオフ付き）
                const success = await sendWithRetry(cleanData);

                if (success) {
                    displayElement.innerHTML = `
                        <div class="loading-msg">
                            <p>実験が正常に終了しました。データは保存されました。</p>
                            <p>ご協力ありがとうございました。</p>
                        </div>
                    `;
                } else {
                    displayElement.innerHTML = `
                        <div class="loading-msg" style="color: red;">
                            <p>データの送信に失敗しました。</p>
                            <p>お手数ですが、以下のデータをコピーして担当者に送付してください。</p>
                            <textarea style="width:80%; height:200px;">${JSON.stringify(cleanData)}</textarea>
                        </div>
                    `;
                }
            }

            /**
             * 指数バックオフによるリトライ機能
             */
            async function sendWithRetry(data, maxRetries = 5) {
                for (let i = 0; i < maxRetries; i++) {
                    try {
                        const response = await fetch(GAS_URL, {
                            method: "POST",
                            mode: "no-cors", // GASへのPOSTは基本no-cors
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify(data)
                        });
                        // no-corsの場合、中身は確認できないが、エラーが出なければ成功とみなす
                        return true; 
                    } catch (error) {
                        console.error(`送信失敗 (試行 ${i + 1}):`, error);
                        if (i < maxRetries - 1) {
                            const delay = Math.pow(2, i) * 1000;
                            await new Promise(resolve => setTimeout(resolve, delay));
                        }
                    }
                }
                return false;
            }

            // 実験の実行
            jsPsych.run(timeline);
        });
    </script>
</body>
</html>
