<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroop Task - jsPsych</title>
    <!-- jsPsych v7.3 の読み込み (CDN) -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        body {
            background-color: #FFFFFF;
            color: #333;
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            user-select: none;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #jspsych-target {
            width: 100%;
            height: 100%;
        }
        .jspsych-content {
            font-size: 24px;
        }
        .stimulus {
            font-size: 60px;
            font-weight: bold;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="jspsych-target"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // GASのWebアプリURL（最新のデプロイIDであることを確認してください）
            const gasUrl = "https://script.google.com/macros/s/AKfycbyu9yv8-qk-JtD9MKXJ62ObB20dupNqoIrIL1mcJ1aA5bSl1eBGFK1bng_5qie8TcyP/exec";

            const jsPsych = initJsPsych({
                display_element: 'jspsych-target',
                on_finish: function() {
                    sendDataToGas();
                }
            });

            const timeline = [];

            // 1. 参加者ID入力
            const participant_id_screen = {
                type: jsPsychSurveyText,
                questions: [
                    {prompt: "参加者ID（例：学籍番号）を入力してください", name: 'ParticipantID', required: true}
                ],
                button_label: "次へ",
                on_finish: function(data) {
                    jsPsych.data.addProperties({
                        subject_id: data.response.ParticipantID,
                        timestamp: new Date().toLocaleString("ja-JP")
                    });
                }
            };
            timeline.push(participant_id_screen);

            // 2. 教示
            const instructions = {
                type: jsPsychHtmlKeyboardResponse,
                stimulus: `
                    <div style="text-align: left; line-height: 1.6;">
                        <p>文字の<strong>「色」</strong>をキーボードで答えてください。</p>
                        <p>・<span style="color:red">赤色</span>なら <strong>'r'</strong></p>
                        <p>・<span style="color:blue">青色</span>なら <strong>'b'</strong></p>
                        <p>・<span style="color:green">緑色</span>なら <strong>'g'</strong></p>
                        <br>
                        <p style="text-align: center;">スペースキーで開始します。</p>
                    </div>
                `,
                choices: [' '],
                post_trial_gap: 1000
            };
            timeline.push(instructions);

            // 3. 刺激定義
            const stimuli_pool = [
                { text: "赤", color: "red", condition: "congruent", correct_key: "r" },
                { text: "青", color: "blue", condition: "congruent", correct_key: "b" },
                { text: "緑", color: "green", condition: "congruent", correct_key: "g" },
                { text: "赤", color: "blue", condition: "incongruent", correct_key: "b" },
                { text: "赤", color: "green", condition: "incongruent", correct_key: "g" },
                { text: "青", color: "red", condition: "incongruent", correct_key: "r" },
                { text: "青", color: "green", condition: "incongruent", correct_key: "g" },
                { text: "緑", color: "red", condition: "incongruent", correct_key: "r" },
                { text: "緑", color: "blue", condition: "incongruent", correct_key: "b" }
            ];

            // 4. 注視点
            const fixation = {
                type: jsPsychHtmlKeyboardResponse,
                stimulus: '<div style="font-size: 60px;">+</div>',
                choices: "NO_KEYS",
                trial_duration: 500,
                data: { task: 'fixation' }
            };

            // 5. 試行
            const test_trial = {
                type: jsPsychHtmlKeyboardResponse,
                stimulus: function() {
                    const text = jsPsych.timelineVariable('text');
                    const color = jsPsych.timelineVariable('color');
                    return `<div class="stimulus" style="color: ${color}">${text}</div>`;
                },
                choices: ['r', 'b', 'g'],
                data: {
                    task: 'response',
                    word: jsPsych.timelineVariable('text'),
                    color: jsPsych.timelineVariable('color'),
                    condition: jsPsych.timelineVariable('condition'),
                    correct_response: jsPsych.timelineVariable('correct_key')
                },
                on_finish: function(data) {
                    data.correct = (data.response === data.correct_response) ? "true" : "false";
                }
            };

            // 6. 手続き
            const main_procedure = {
                timeline: [fixation, test_trial],
                timeline_variables: stimuli_pool,
                sample: {
                    type: 'with-replacement',
                    size: 10
                },
                post_trial_gap: 1000
            };
            timeline.push(main_procedure);

            /**
             * GASへのデータ送信（Form Data形式を利用してCORS制限を回避）
             */
            async function sendDataToGas() {
                const displayElement = jsPsych.getDisplayElement();
                displayElement.innerHTML = `
                    <div style="text-align:center;">
                        <p>データを送信しています。しばらくお待ちください...</p>
                        <div class="spinner"></div>
                    </div>
                `;

                const allData = jsPsych.data.get().filter({task: 'response'}).values();
                const cleanData = allData.map(trial => ({
                    subject_id: trial.subject_id,
                    timestamp: trial.timestamp,
                    word: trial.word,
                    color: trial.color,
                    condition: trial.condition,
                    rt: Math.round(trial.rt),
                    correct: trial.correct
                }));

                // JSONを文字列にして URLSearchParams に詰め込む
                // これにより GAS 側で e.parameter.payload として受け取れるようになる
                const formData = new URLSearchParams();
                formData.append('payload', JSON.stringify(cleanData));

                const fetchWithRetry = async (url, body, retries = 5, delay = 1000) => {
                    for (let i = 0; i < retries; i++) {
                        try {
                            await fetch(url, {
                                method: 'POST',
                                mode: 'no-cors', // 重要
                                headers: {
                                    'Content-Type': 'application/x-www-form-urlencoded'
                                },
                                body: body.toString()
                            });
                            // no-cors の場合、エラーが出なければ成功と判断する
                            return true;
                        } catch (err) {
                            if (i === retries - 1) throw err;
                            await new Promise(res => setTimeout(res, delay));
                            delay *= 2;
                        }
                    }
                };

                try {
                    await fetchWithRetry(gasUrl, formData);
                    
                    displayElement.innerHTML = `
                        <div style="text-align:center;">
                            <h3>データ送信リクエストを完了しました</h3>
                            <p>サーバー側の処理には数秒かかる場合があります。スプレッドシートを確認してください。</p>
                            <p>ご協力ありがとうございました。</p>
                            <br>
                            <button onclick="window.close()" style="padding: 10px 20px; cursor: pointer;">終了する</button>
                        </div>
                    `;
                } catch (error) {
                    displayElement.innerHTML = `
                        <div style="text-align:center; color: #D32F2F;">
                            <h3>送信エラー</h3>
                            <p>自動送信に失敗しました。以下の内容をコピーして保存してください：</p>
                            <textarea readonly style="width:90%; height:200px;">${JSON.stringify(cleanData)}</textarea>
                        </div>
                    `;
                }
            }

            jsPsych.run(timeline);
        });
    </script>
</body>
</html>
