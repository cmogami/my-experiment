YPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroop Task - Data Integration</title>
    <!-- jsPsych v7.3 -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        /* Base Layout Settings */
        html, body {
            background-color: #FFFFFF;
            color: #333;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 防止スクロール */
        }

        #jspsych-target {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 刺激の表示設定（上下切れを防止） */
        .stimulus {
            font-size: 80px; 
            font-weight: bold;
            line-height: 1.5; /* 行の高さを十分に確保 */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 150px; /* 文字が切れないように高さを最低限確保 */
            min-width: 300px;
            text-align: center;
            box-sizing: border-box;
        }

        /* メッセージボックスの設定 */
        .message-box {
            font-size: 18px;
            text-align: center;
            padding: 20px;
            line-height: 1.6;
            max-width: 800px;
            width: 90%;
            overflow-y: auto;
            max-height: 90vh;
        }

        textarea {
            width: 100%;
            height: 150px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            border: 1px solid #ccc;
            background: #f9f9f9;
        }
    </style>
</head>
<body>
    <div id="jspsych-target"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- Settings ---
            const webAppUrl = 'https://script.google.com/macros/s/AKfycbzu6mi8N8kSWZ1u6GVroOkHk3aGGjWLeGcnjoLxAn-xHwDnQgf83Frh8w5I9YDsgkeKCg/exec';

            const jsPsych = initJsPsych({
                display_element: 'jspsych-target',
                on_finish: function() {
                    const displayElement = jsPsych.getDisplayElement();
                    displayElement.innerHTML = '<div class="message-box">データを集計して送信しています。そのままお待ちください...</div>';

                    // 分析に必要なデータのみを抽出
                    const relevantData = jsPsych.data.get()
                        .filter({ task: 'response' })
                        .ignore(['stimulus', 'trial_type', 'trial_index', 'internal_node_id', 'task', 'response_type', 'correct_response']);

                    const csvData = relevantData.csv();

                    // 指数バックオフを用いたデータ送信
                    sendDataWithRetries(csvData, 0);
                }
            });

            /**
             * 指数バックオフによるデータ送信処理
             */
            async function sendDataWithRetries(csv, retryCount) {
                const maxRetries = 5;
                const delays = [1000, 2000, 4000, 8000, 16000];
                const displayElement = jsPsych.getDisplayElement();

                const finalScreenBase = (statusMsg) => `
                    <div class="message-box">
                        <h2 style="margin-bottom: 10px;">実験終了</h2>
                        <p>${statusMsg}</p>
                        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
                        <p style="font-size: 14px; color: #666; text-align: left;">
                            【バックアップ用CSVデータ】<br>
                            自動送信に失敗した場合や確認が必要な場合は、以下の内容をすべてコピーして保存してください。
                        </p>
                        <textarea readonly>${csv}</textarea>
                        <p style="margin-top: 15px; font-size: 14px;">ブラウザを閉じて終了してください。</p>
                    </div>`;

                try {
                    await fetch(webAppUrl, {
                        method: 'POST',
                        body: JSON.stringify({ csvData: csv }),
                        headers: { 'Content-Type': 'application/json' },
                        mode: 'no-cors' 
                    });
                    displayElement.innerHTML = finalScreenBase("データの保存が正常に完了しました。ご協力ありがとうございました。");
                } catch (error) {
                    if (retryCount < maxRetries) {
                        setTimeout(() => {
                            sendDataWithRetries(csv, retryCount + 1);
                        }, delays[retryCount]);
                    } else {
                        displayElement.innerHTML = finalScreenBase("<span style='color: red;'>データの自動保存に失敗しました。</span><br>お手数ですが、上のテキストボックスの内容をすべてコピーして調査担当者に送付してください。");
                    }
                }
            }

            const timeline = [];

            // 1. 参加者ID入力
            const p_id_input = {
                type: jsPsychSurveyText,
                questions: [
                    { prompt: '参加者ID（例：学籍番号）を入力してください', name: 'subject_id', required: true }
                ],
                button_label: '次へ',
                on_finish: function(data) {
                    const id = data.response.subject_id;
                    const timestamp = new Date().toLocaleString('ja-JP');
                    jsPsych.data.addProperties({
                        subject_id: id,
                        timestamp: timestamp
                    });
                }
            };
            timeline.push(p_id_input);

            // 2. 教示画面
            const instructions = {
                type: jsPsychHtmlKeyboardResponse,
                stimulus: `
                    <div style="text-align: left; line-height: 1.6;">
                        <p>画面に表示される文字の<strong>「色」</strong>をできるだけ速く答えてください。</p>
                        <p>・<span style="color:red">赤色</span>の文字なら <strong>'r'</strong> キー</p>
                        <p>・<span style="color:blue">青色</span>の文字なら <strong>'b'</strong> キー</p>
                        <p>・<span style="color:green">緑色</span>の文字なら <strong>'g'</strong> キー</p>
                        <br>
                        <p style="text-align: center;">準備ができたら、スペースキーを押して開始してください。</p>
                    </div>
                `,
                choices: [' '],
                post_trial_gap: 1000
            };
            timeline.push(instructions);

            // 3. 刺激の定義
            const stimuli_pool = [
                { text: "赤", color: "red", condition: "congruent", correct_key: "r" },
                { text: "青", color: "blue", condition: "congruent", correct_key: "b" },
                { text: "緑", color: "green", condition: "congruent", correct_key: "g" },
                { text: "赤", color: "blue", condition: "incongruent", correct_key: "b" },
                { text: "赤", color: "green", condition: "incongruent", correct_key: "g" },
                { text: "青", color: "red", condition: "incongruent", correct_key: "r" },
                { text: "青", color: "green", condition: "incongruent", correct_key: "g" },
                { text: "緑", color: "red", condition: "incongruent", correct_key: "r" },
                { text: "緑", color: "blue", condition: "incongruent", correct_key: "b" }
            ];

            // 注視点 (500ms)
            const fixation = {
                type: jsPsychHtmlKeyboardResponse,
                stimulus: '<div style="font-size: 60px;">+</div>',
                choices: "NO_KEYS",
                trial_duration: 500,
                data: { task: 'fixation' }
            };

            // 反応試行
            const test_trial = {
                type: jsPsychHtmlKeyboardResponse,
                stimulus: function() {
                    const text = jsPsych.timelineVariable('text');
                    const color = jsPsych.timelineVariable('color');
                    return `<div class="stimulus" style="color: ${color}">${text}</div>`;
                },
                choices: ['r', 'b', 'g'],
                data: {
                    task: 'response',
                    word: jsPsych.timelineVariable('text'),
                    color: jsPsych.timelineVariable('color'),
                    condition: jsPsych.timelineVariable('condition'),
                    correct_response: jsPsych.timelineVariable('correct_key')
                },
                on_finish: function(data) {
                    data.correct = (data.response === data.correct_response) ? "true" : "false";
                }
            };

            // メイン手続き (10試行)
            const main_procedure = {
                timeline: [fixation, test_trial],
                timeline_variables: stimuli_pool,
                sample: {
                    type: 'with-replacement',
                    size: 10
                },
                post_trial_gap: 1000 // ITI 1000ms
            };
            timeline.push(main_procedure);

            jsPsych.run(timeline);
        });
    </script>
</body>
</html>
