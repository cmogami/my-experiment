<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>意思決定と判断に関する調査実験</title>
  
  <!-- jsPsych CDNの読み込み -->
  <script src="https://unpkg.com/jspsych@7.3.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.2"></script>
  
  <!-- Tailwind CSSによるUIスタイリング -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- jsPsychのデフォルトスタイルシート -->
  <link href="https://unpkg.com/jspsych@7.3.0/css/jspsych.css" rel="stylesheet" type="text/css">

  <style>
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
      user-select: none;
    }
    .jspsych-btn {
      padding: 0.75rem 2rem !important;
      font-size: 1.1rem !important;
      font-weight: 600 !important;
      border-radius: 0.5rem !important;
      transition: all 0.2s ease !important;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1) !important;
    }
    .jspsych-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1) !important;
    }
    .experiment-card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
      padding: 3rem 2rem;
      max-width: 700px;
      width: 95%;
      margin: 1.5rem auto;
      text-align: left;
    }
    .btn-yes {
      background-color: #3b82f6 !important;
      color: white !important;
      border: none !important;
    }
    .btn-yes:hover {
      background-color: #2563eb !important;
    }
    .btn-no {
      background-color: #ef4444 !important;
      color: white !important;
      border: none !important;
    }
    .btn-no:hover {
      background-color: #dc2626 !important;
    }
    .btn-next {
      background-color: #10b981 !important;
      color: white !important;
      border: none !important;
    }
    .btn-next:hover {
      background-color: #059669 !important;
    }
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="jspsych-target" class="min-h-screen flex items-center justify-center p-4"></div>

  <script>
    // ----------------------------------------------------
    // GAS送信用のエンドポイント設定
    // ----------------------------------------------------
    const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyRRKtEko0RWmniwiKynOMah58XCZij2iNkugp4HGK6z-Q0V5kNdaMnYiqW27sjR9Mi/exec";

    // 実験の総所要時間測定用
    const startTime = performance.now();

    // ----------------------------------------------------
    // 1. 実験初期設定・グループ割り当て
    // ----------------------------------------------------
    const jsPsych = initJsPsych({
      display_element: 'jspsych-target',
      on_finish: function() {
        // 実験終了時にスプレッドシートへ自動送信
        sendDataToGAS(jsPsych.data.get());
      }
    });

    // グループのランダム決定 (0: A→B順 [条件1] / 1: B→A順 [条件2])
    const group = Math.floor(Math.random() * 2);
    const groupName = group === 0 ? "A-B" : "B-A";
    
    // 参加者のシステム管理用一意IDを生成（バックアップ用）
    const systemId = 'SYS_' + Math.random().toString(36).substring(2, 10).toUpperCase();

    // 共通データにグループとシステムIDを初期保存
    jsPsych.data.addProperties({
      system_id: systemId,
      assigned_group: groupName
    });

    const timeline = [];

    // ----------------------------------------------------
    // 2. 質問文の定義 【タイパ vs コスパ】
    // ----------------------------------------------------

    // さりげないダミー質問（意思決定やライフスタイル傾向にカモフラージュしたクッション質問）
    const dummy_questions = [
      {
        question: "あなたは普段、新しい飲食店を開拓するよりも、お気に入りで行き慣れたお店に繰り返し行くことの方が多いですか？",
        id: "dummy_1"
      },
      {
        question: "あなたは物事を進める際、事前に予定を細かく計画して動くよりも、その日の気分や状況に合わせて柔軟に行動することの方が多いですか？",
        id: "dummy_2"
      },
      {
        question: "あなたは何か買い物をするとき、実用性や多機能さよりも、デザインや見た目の好みを最優先して選ぶことの方が多いですか？",
        id: "dummy_3"
      }
    ];

    // ターゲット質問ペア1：【学習スタイルにおけるタイパ vs コスパ】
    const target1_A = {
      question: "時間や労力を節約するため、多少お金を払ってでも要点や対策が整理された教材（対策本や学習アプリ等）を使い、最短の時間で要領よく単位修得や試験合格を目指すやり方は、就学スタイルとして合理的で魅力的だと思いますか？",
      id: "target1_A_study_time"
    };
    const target1_B = {
      question: "お金を節約するため、多少の時間や手間がかかっても、図書館の専門書や無料のWeb情報を自力で調べ上げ、できるだけコストをかけずに深い知識を身につけようとするやり方は、就学スタイルとして価値があり魅力的だと思いますか？",
      id: "target1_B_study_cost"
    };

    // ターゲット質問ペア2：【娯楽・コンテンツ消費におけるタイパ vs コスパ】
    const target2_A = {
      question: "話題のコンテンツや大量の情報を効率よく把握するため、動画や映画を倍速で視聴したり、10秒スキップや要約（まとめ）サイトを活用して短い時間でトレンドを追うスタイルは、現代の時間の使い方として賢く合理的だと思いますか？",
      id: "target2_A_media_time"
    };
    const target2_B = {
      question: "せっかく購入したコンテンツや月額サブスクリプションサービスの価値を最大限に引き出すため、動画や映画、ゲーム等にじっくりと時間をかけ、細部まで丁寧に鑑賞して楽しむスタイルは、本来の娯楽 of あり方として魅力的だと思いますか？",
      id: "target2_B_media_cost"
    };

    // ----------------------------------------------------
    // 3. 実験画面（トライアル）の構築
    // ----------------------------------------------------

    // 3.1 同意説明画面
    const consent = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="experiment-card">
          <h1 class="text-2xl font-bold mb-4 border-b pb-2 text-blue-600">調査へのご協力のお願い</h1>
          <p class="mb-4 text-sm text-slate-600 leading-relaxed">
            本調査は、日常的な事象に対する人々の評価や判断の傾向を調べるための学術研究（卒業研究）です。所要時間は5分程度です。
          </p>
          <h2 class="text-lg font-semibold mb-2">【注意事項と同意事項】</h2>
          <ul class="list-disc pl-5 mb-6 text-sm text-slate-600 space-y-2">
            <li>この調査への参加は完全に自由です。途中で回答を中止したくなったり、画面を閉じたりしても何らかの不利益を被ることはありません。</li>
            <li>回答データはすべて個人が特定できない形式で統計的に処理され、卒論などの学術的公表目的のみで使用されます。</li>
            <li>途中でブラウザの「戻る」ボタンを押すと、正常にデータが記録されなくなりますので、最後まで進めていただきますようお願いいたします。</li>
            <li>集中して一気に回答できる環境で進めてください。</li>
          </ul>
          <p class="font-medium text-slate-700">以上の内容を十分に理解し、同意して調査に参加していただけますか？</p>
        </div>
      `,
      choices: ['同意して次へ進む'],
      button_html: '<button class="jspsych-btn btn-next mx-auto block">%choice%</button>'
    };
    timeline.push(consent);

    // 3.2 学籍番号・年齢・性別 入力画面
    const profile_form = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="experiment-card">
          <h1 class="text-2xl font-bold mb-6 border-b pb-2 text-indigo-600">参加者情報のご入力</h1>
          <p class="mb-6 text-sm text-slate-500">
            実験の統計処理およびデータの整理のため、以下の項目についてご回答をお願いいたします。<br>
            ※個人情報は厳重に管理され、本研究以外の目的で使用されることは一切ありません。
          </p>
          
          <div class="space-y-4 mb-6">
            <!-- 学籍番号 -->
            <div>
              <label for="student_id" class="block text-sm font-semibold text-slate-700 mb-1">学籍番号 <span class="text-red-500">*</span></label>
              <input type="text" id="student_id" name="student_id" placeholder="例: 2312C30" 
                     class="w-full px-4 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg">
            </div>

            <!-- 年齢 -->
            <div>
              <label for="age" class="block text-sm font-semibold text-slate-700 mb-1">年齢 <span class="text-red-500">*</span></label>
              <input type="number" id="age" name="age" min="15" max="100" placeholder="例: 20" 
                     class="w-full px-4 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg">
            </div>

            <!-- 性別 -->
            <div>
              <label for="gender" class="block text-sm font-semibold text-slate-700 mb-1">性別 <span class="text-red-500">*</span></label>
              <select id="gender" name="gender" 
                      class="w-full px-4 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg bg-white">
                <option value="" disabled selected>選択してください</option>
                <option value="男性">男性</option>
                <option value="女性">女性</option>
                <option value="その他">その他</option>
                <option value="回答しない">回答しない</option>
              </select>
            </div>
          </div>

          <!-- エラーメッセージ用エリア -->
          <div id="error-message" class="text-red-500 text-sm font-bold mb-4 hidden"></div>
        </div>
      `,
      choices: ['情報を登録して調査説明へ進む'],
      button_html: '<button id="btn-submit-profile" class="jspsych-btn btn-next mx-auto block">%choice%</button>',
      on_load: function() {
        const submitBtn = document.getElementById('btn-submit-profile');
        submitBtn.addEventListener('click', function(e) {
          const studentId = document.getElementById('student_id').value.trim();
          const age = document.getElementById('age').value.trim();
          const gender = document.getElementById('gender').value;
          const errorDiv = document.getElementById('error-message');

          if (!studentId || !age || !gender) {
            e.stopPropagation();
            errorDiv.textContent = '※すべての必須項目(*)を入力または選択してください。';
            errorDiv.classList.remove('hidden');
            return;
          }

          if (isNaN(age) || parseInt(age) <= 0) {
            e.stopPropagation();
            errorDiv.textContent = '※年齢は正しい数値で入力してください。';
            errorDiv.classList.remove('hidden');
            return;
          }

          jsPsych.data.addProperties({
            student_id: studentId,
            age: parseInt(age),
            gender: gender
          });
        }, true);
      }
    };
    timeline.push(profile_form);

    // Yes/No 質問表示テンプレート
    function makeQuestionTrial(qObj, category = "dummy") {
      return {
        type: jsPsychHtmlButtonResponse,
        stimulus: `
          <div class="experiment-card">
            <p class="text-xl font-bold leading-relaxed mb-8 text-slate-800">${qObj.question}</p>
          </div>
        `,
        choices: ['はい (Yes)', 'いいえ (No)'],
        button_html: [
          '<button class="jspsych-btn btn-yes mb-3 md:mb-0 md:mr-4 w-full md:w-auto">%choice%</button>',
          '<button class="jspsych-btn btn-no w-full md:w-auto">%choice%</button>'
        ],
        data: {
          trial_type_detail: 'test',
          question_id: qObj.id,
          question_category: category
        },
        on_finish: function(data) {
          data.response_label = data.response === 0 ? 'Yes' : 'No';
        }
      };
    }

    // 3.3 調査説明画面
    const test_instruction = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="experiment-card text-center">
          <h1 class="text-2xl font-bold mb-4 text-slate-800">判断調査の開始</h1>
          <p class="mb-6 leading-relaxed text-slate-600 text-left">
            これから、日常的な生活習慣や物事の選択傾向に関するいくつかの質問が1画面に1問ずつ表示されます。<br><br>
            あまり深く考え込まず、あなたの心の中の直感に従って、<br>
            <strong>できるだけ素早くスムーズに</strong>【はい (Yes)】または【いいえ (No)】でお答えください。
          </p>
        </div>
      `,
      choices: ['調査を開始する'],
      button_html: '<button class="jspsych-btn btn-next mx-auto block">%choice%</button>'
    };
    timeline.push(test_instruction);

    // ----------------------------------------------------
    // 4. ランダム割り当てに応じた質問順序の適用
    // ----------------------------------------------------
    if (group === 0) {
      // --- 条件1（A→B順） ---
      timeline.push(makeQuestionTrial(target1_A, "target1_A_study_time"));
      timeline.push(makeQuestionTrial(target1_B, "target1_B_study_cost"));
      timeline.push(makeQuestionTrial(dummy_questions[0], "dummy"));
      timeline.push(makeQuestionTrial(dummy_questions[1], "dummy"));
      timeline.push(makeQuestionTrial(target2_A, "target2_A_media_time"));
      timeline.push(makeQuestionTrial(target2_B, "target2_B_media_cost"));
      timeline.push(makeQuestionTrial(dummy_questions[2], "dummy"));
    } else {
      // --- 条件2（B→A順） ---
      timeline.push(makeQuestionTrial(target1_B, "target1_B_study_cost"));
      timeline.push(makeQuestionTrial(target1_A, "target1_A_study_time"));
      timeline.push(makeQuestionTrial(dummy_questions[0], "dummy"));
      timeline.push(makeQuestionTrial(dummy_questions[1], "dummy"));
      timeline.push(makeQuestionTrial(target2_B, "target2_B_media_cost"));
      timeline.push(makeQuestionTrial(target2_A, "target2_A_media_time"));
      timeline.push(makeQuestionTrial(dummy_questions[2], "dummy"));
    }

    // ----------------------------------------------------
    // 5. 理解度チェック 兼 送信トリガー画面
    // ----------------------------------------------------
    const check_trial = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="experiment-card">
          <h1 class="text-xl font-bold mb-4 text-slate-800 border-b pb-2">最後に確認の質問です</h1>
          <p class="mb-6 leading-relaxed text-slate-600 text-sm">
            今回の本番課題に回答する際、あなたに対してあらかじめ伝えられていた「回答のルール」として最も当てはまるものを、以下から1つ選んでください。
          </p>
          <div class="space-y-3 mb-6">
            <label class="flex items-start p-4 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer transition-all">
              <input type="radio" name="rule_check" value="0" class="mt-1 mr-3 h-4 w-4 text-indigo-600 border-slate-300 focus:ring-indigo-500">
              <span class="text-sm font-medium text-slate-700 leading-normal">できるだけ熟考し、非常に時間をかけて客観的根拠をもとに答える。</span>
            </label>
            <label class="flex items-start p-4 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer transition-all">
              <input type="radio" name="rule_check" value="1" class="mt-1 mr-3 h-4 w-4 text-indigo-600 border-slate-300 focus:ring-indigo-500">
              <span class="text-sm font-medium text-slate-700 leading-normal">あまり深く考え込まず、直感的に、できるだけ素早く答える。</span>
            </label>
            <label class="flex items-start p-4 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer transition-all">
              <input type="radio" name="rule_check" value="2" class="mt-1 mr-3 h-4 w-4 text-indigo-600 border-slate-300 focus:ring-indigo-500">
              <span class="text-sm font-medium text-slate-700 leading-normal">自分自身の本音ではなく、一般的な社会の平均を推測して答える。</span>
            </label>
          </div>
          <div id="error-message-check" class="text-red-500 text-sm font-bold mb-4 hidden">※回答を選択してください。</div>
        </div>
      `,
      choices: ['回答を送信して実験を終了する'],
      button_html: '<button id="btn-submit-check" class="jspsych-btn btn-next mx-auto block">%choice%</button>',
      on_load: function() {
        const submitBtn = document.getElementById('btn-submit-check');
        submitBtn.addEventListener('click', function(e) {
          const selected = document.querySelector('input[name="rule_check"]:checked');
          const errorDiv = document.getElementById('error-message-check');

          if (!selected) {
            e.stopPropagation();
            errorDiv.classList.remove('hidden');
            return;
          }
          
          // 一時的プロパティに保存
          jsPsych.data.addProperties({
            temp_check_response: parseInt(selected.value)
          });
        }, true);
      },
      data: {
        question_id: "comprehension_check"
      },
      on_finish: function(data) {
        const responseVal = jsPsych.data.get().select('temp_check_response').values[0];
        data.response = responseVal;
        data.correct = (responseVal === 1);
      }
    };
    timeline.push(check_trial);

    // 実験タイムラインの起動
    jsPsych.run(timeline);

    // ----------------------------------------------------
    // 7. GASへの構造化データ送信処理
    // ----------------------------------------------------
    async function sendDataToGAS(data) {
      const targetDiv = document.getElementById('jspsych-target');
      
      targetDiv.innerHTML = `
        <div class="experiment-card text-center">
          <div class="loader"></div>
          <h2 class="text-xl font-bold mb-2 text-slate-800">データをスプレッドシートに送信中...</h2>
          <p class="text-slate-500 text-sm">画面を閉じずにそのまま少々お待ちください。</p>
        </div>
      `;

      // 共通データの抽出
      const studentId = data.select('student_id').values[0] || "N/A";
      const age = data.select('age').values[0] || "N/A";
      const gender = data.select('gender').values[0] || "N/A";
      const assignedGroup = data.select('assigned_group').values[0] || "UNKNOWN";

      // 総所要時間の計算（秒単位）
      const endTime = performance.now();
      const rtTotal = Math.round((endTime - startTime) / 1000);

      // 理解度チェックの確認
      let isCheckCorrect = "UNKNOWN";
      const checkTrial = data.filter({question_id: 'comprehension_check'}).values()[0];
      if (checkTrial) {
        isCheckCorrect = checkTrial.correct ? "CORRECT" : "INCORRECT";
      }

      // ターゲット質問回答の抽出
      const getTrialData = (qId) => {
        const trial = data.filter({question_id: qId}).values()[0];
        return trial ? { response: trial.response_label, rt: Math.round(trial.rt) } : { response: "", rt: "" };
      };

      const t1_A = getTrialData("target1_A_study_time");
      const t1_B = getTrialData("target1_B_study_cost");
      const t2_A = getTrialData("target2_A_media_time");
      const t2_B = getTrialData("target2_B_media_cost");

      // GASに送信する「2行分」の配列データを構築
      const payload = [
        {
          category: "学習",
          condition: assignedGroup,
          response_A: t1_A.response,
          response_B: t1_B.response,
          rt_A: t1_A.rt,
          rt_B: t1_B.rt,
          comprehension_check: isCheckCorrect,
          student_id: studentId,
          age: age,
          gender: gender,
          rt_total: rtTotal
        },
        {
          category: "娯楽消費",
          condition: assignedGroup,
          response_A: t2_A.response,
          response_B: t2_B.response,
          rt_A: t2_A.rt,
          rt_B: t2_B.rt,
          comprehension_check: isCheckCorrect,
          student_id: studentId,
          age: age,
          gender: gender,
          rt_total: rtTotal
        }
      ];

      // 通信リトライ関数（最大5回指数バックオフ）
      const fetchWithRetry = async (url, options, retries = 5, delay = 1000) => {
        try {
          const response = await fetch(url, options);
          
          if (options.mode === 'no-cors' || response.type === 'opaque') {
            return { result: "opaque_success" };
          }
          
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          return await response.json();
        } catch (error) {
          if (retries > 0) {
            await new Promise(resolve => setTimeout(resolve, delay));
            return fetchWithRetry(url, options, retries - 1, delay * 2);
          } else {
            throw error;
          }
        }
      };

      try {
        // mode: 'no-cors' で送信し、ブラウザのCORS制限によるリクエスト遮断を完全に防止
        await fetchWithRetry(GAS_WEBAPP_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(payload)
        });
        
        showSuccessScreen(studentId, assignedGroup, isCheckCorrect, payload);
      } catch (error) {
        console.error("データの送信に失敗しました:", error);
        showFailureScreen(studentId, assignedGroup, isCheckCorrect, payload);
      }
    }

              ベイズ推論を基礎とする伝統的な「古典確率モデル」では、質問の順序が変わっても、本来各質問に対するYes/Noの確率は変化しないはずです。しかし、人間の認知判断は前に提示された質問の「文脈」に強く干渉されます。これを、近年認知心理学で注目されている「量子力学の数理的な枠組み（非可換性）」を適用した<strong>「量子認知モデル」</strong>を用いて、一貫性のある数理モデルとして記述できるかを比較検討しています。
