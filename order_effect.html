<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>意思決定と判断に関する調査実験</title>
  
  <!-- jsPsych CDNの読み込み -->
  <script src="https://unpkg.com/jspsych@7.3.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.2"></script>
  
  <!-- Tailwind CSSによるUIスタイリング -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Inter & Noto Sans JP -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <!-- jsPsychのデフォルトスタイルシート -->
  <link href="https://unpkg.com/jspsych@7.3.0/css/jspsych.css" rel="stylesheet" type="text/css">

  <style>
    body {
      font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 50% 50%, #f8fafc 0%, #f1f5f9 100%);
      color: #0f172a;
      user-select: none;
      min-height: 100vh;
    }
    
    /* jsPsychのボタン上書きスタイル */
    .jspsych-btn {
      padding: 0.875rem 2.5rem !important;
      font-size: 1.05rem !important;
      font-weight: 600 !important;
      border-radius: 0.75rem !important;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1) !important;
      border: 1px solid transparent !important;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03) !important;
    }
    
    .jspsych-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05) !important;
    }

    .jspsych-btn:active {
      transform: translateY(0);
    }

    /* プレミアムな実験カード */
    .experiment-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(226, 232, 240, 0.8);
      border-radius: 1.25rem;
      box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.05), 0 10px 10px -5px rgba(15, 23, 42, 0.02);
      padding: 3.5rem 2.5rem;
      max-width: 750px;
      width: 95%;
      margin: 2rem auto;
      text-align: left;
    }

    /* レスポンシブ調整（スマホ向け） */
    @media (max-width: 640px) {
      .experiment-card {
        padding: 2rem 1.5rem;
        margin: 1rem auto;
      }
    }

    /* ボタンカラーの明示 */
    .btn-yes {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%) !important;
      color: white !important;
    }
    .btn-yes:hover {
      background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%) !important;
    }
    .btn-no {
      background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%) !important;
      color: white !important;
    }
    .btn-no:hover {
      background: linear-gradient(135deg, #b91c1c 0%, #991b1b 100%) !important;
    }
    .btn-next {
      background: linear-gradient(135deg, #059669 0%, #047857 100%) !important;
      color: white !important;
    }
    .btn-next:hover {
      background: linear-gradient(135deg, #047857 0%, #065f46 100%) !important;
    }

    /* ローダースピン */
    .loader {
      border: 4px solid #f1f5f9;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s cubic-bezier(0.55, 0.17, 0.2, 0.89) infinite;
      margin: 24px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- 全体の配置用コンテナ -->
  <div id="jspsych-target" class="min-h-screen flex items-center justify-center p-4"></div>

  <script>
    // ----------------------------------------------------
    // GAS送信用のエンドポイント設定
    // ----------------------------------------------------
    const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyRRKtEko0RWmniwiKynOMah58XCZij2iNkugp4HGK6z-Q0V5kNdaMnYiqW27sjR9Mi/exec";

    // 実験の総所要時間測定用
    const startTime = performance.now();

    // ----------------------------------------------------
    // 1. 実験初期設定・グループ割り当て
    // ----------------------------------------------------
    const jsPsych = initJsPsych({
      display_element: 'jspsych-target',
      on_finish: function() {
        // 実験終了時にスプレッドシートへ自動送信
        sendDataToGAS(jsPsych.data.get());
      }
    });

    // グループのランダム決定 (0: A→B順 [条件1] / 1: B→A順 [条件2])
    const group = Math.floor(Math.random() * 2);
    const groupName = group === 0 ? "A-B" : "B-A";
    
    // 参加者のシステム管理用一意IDを生成（バックアップ用）
    const systemId = 'SYS_' + Math.random().toString(36).substring(2, 10).toUpperCase();

    // 共通データにグループとシステムIDを初期保存
    jsPsych.data.addProperties({
      system_id: systemId,
      assigned_group: groupName
    });

    const timeline = [];

    // ----------------------------------------------------
    // 2. 質問文の定義 【タイパ vs コスパ】
    // ----------------------------------------------------

    // さりげないダミー質問（意思決定やライフスタイル傾向にカモフラージュしたクッション質問）
    const dummy_questions = [
      {
        question: "あなたは普段、新しい飲食店を開拓するよりも、お気に入りで行き慣れたお店に<strong class='text-indigo-600 font-bold border-b-2 border-indigo-200 pb-0.5'>繰り返し行く</strong>ことの方が多いですか？",
        id: "dummy_1"
      },
      {
        question: "あなたは物事を進める際、事前に予定を細かく計画して動くよりも、その日の気分や状況に合わせて<strong class='text-indigo-600 font-bold border-b-2 border-indigo-200 pb-0.5'>柔軟に行動する</strong>ことの方が多いですか？",
        id: "dummy_2"
      },
      {
        question: "あなたは何か買い物をするとき、実用性や多機能さよりも、デザインや見た目の好みを<strong class='text-indigo-600 font-bold border-b-2 border-indigo-200 pb-0.5'>最優先して選ぶ</strong>ことの方が多いですか？",
        id: "dummy_3"
      }
    ];

    // ターゲット質問ペア1：【学習スタイルにおけるタイパ vs コスパ】
    const target1_A = {
      question: "時間や労力を節約するため、多少お金を払ってでも要点や対策が整理された教材（対策本や学習アプリ等）を使い、<strong class='text-rose-600 font-bold border-b-2 border-rose-200 pb-0.5'>最短の時間で要領よく</strong>単位修得や試験合格を目指すやり方は、就学スタイルとして合理的で魅力的だと思いますか？",
      id: "target1_A_study_time"
    };
    const target1_B = {
      question: "お金を節約するため、多少の時間や手間がかかっても、図書館の専門書や無料のWeb情報を自力で調べ上げ、<strong class='text-blue-600 font-bold border-b-2 border-blue-200 pb-0.5'>できるだけコストをかけずに</strong>深い知識を身につけようとするやり方は、就学スタイルとして価値があり魅力的だと思いますか？",
      id: "target1_B_study_cost"
    };

    // ターゲット質問ペア2：【娯楽・コンテンツ消費におけるタイパ vs コスパ】
    const target2_A = {
      question: "話題のコンテンツや大量の情報を効率よく把握するため、動画や映画を倍速で視聴したり、10秒スキップや要約（まとめ）サイトを活用して<strong class='text-rose-600 font-bold border-b-2 border-rose-200 pb-0.5'>短い時間で</strong>トレンドを追うスタイルは、現代の時間の使い方として賢く合理的だと思いますか？",
      id: "target2_A_media_time"
    };
    const target2_B = {
      question: "せっかく購入したコンテンツや月額サブスクリプションサービスの価値を最大限に引き出すため、動画や映画、ゲーム等に<strong class='text-blue-600 font-bold border-b-2 border-blue-200 pb-0.5'>じっくりと時間をかけ</strong>、細部まで丁寧に鑑賞して楽しむスタイルは、本来の娯楽のあり方として魅力的だと思いますか？",
      id: "target2_B_media_cost"
    };

    // ----------------------------------------------------
    // 3. 実験画面（トライアル）の構築
    // ----------------------------------------------------

    // 3.1 同意説明画面
    const consent = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="experiment-card">
          <div class="flex items-center space-x-3 mb-6 border-b pb-4">
            <div class="p-2 bg-blue-50 text-blue-600 rounded-lg">
              <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
              </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">調査へのご協力のお願い</h1>
          </div>
          
          <p class="mb-4 text-base text-slate-600 leading-relaxed">
            本調査は、日常的な事象に対する人々の評価や判断の傾向を調べるための学術研究（卒業研究）です。所要時間は <strong>約5分</strong> 程度です。
          </p>

          <div class="bg-slate-50 border border-slate-200 rounded-xl p-5 mb-6">
            <h2 class="text-sm font-bold text-slate-700 uppercase tracking-wider mb-3 flex items-center">
              <svg class="h-4 w-4 text-amber-500 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
              </svg>
              注意事項と同意事項
            </h2>
            <ul class="list-disc pl-5 text-sm text-slate-600 space-y-2">
              <li>この調査への参加は<strong>完全に自由</strong>です。途中で回答を中止したくなったり、画面を閉じたりしても不利益を被ることはありません。</li>
              <li>回答データはすべて個人が特定できない形式で統計的に処理され、学術的公表目的（卒論発表等）のみで使用されます。</li>
              <li>途中でブラウザの「戻る」ボタンを押すと正常にデータが記録できなくなります。<strong>最後まで戻らずに</strong>進めていただきますようお願いいたします。</li>
              <li>集中して回答できる環境で進めてください。</li>
            </ul>
          </div>
          <p class="font-medium text-slate-800 mb-2 text-center">以上の内容を十分に理解し、同意して調査に参加していただけますか？</p>
        </div>
      `,
      choices: ['同意して次へ進む'],
      button_html: '<button class="jspsych-btn btn-next mx-auto block">%choice%</button>'
    };
    timeline.push(consent);

    // 3.2 学籍番号・年齢・性別 入力画面
    const profile_form = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="experiment-card">
          <div class="flex items-center space-x-3 mb-6 border-b pb-4">
            <div class="p-2 bg-indigo-50 text-indigo-600 rounded-lg">
              <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">参加者情報のご入力</h1>
          </div>
          
          <p class="mb-6 text-sm text-slate-500">
            実験の統計処理およびデータの整理のため、以下の項目についてご回答をお願いいたします。<br>
            <span class="text-xs text-indigo-600 font-semibold">※個人情報は厳重に管理され、本研究以外の目的で使用されることはありません。</span>
          </p>
          
          <div class="space-y-5 mb-6">
            <!-- 学籍番号 -->
            <div>
              <label for="student_id" class="block text-sm font-semibold text-slate-700 mb-1.5 flex items-center">
                学籍番号 <span class="text-red-500 ml-1">*</span>
              </label>
              <input type="text" id="student_id" name="student_id" placeholder="例: 2312C30" 
                     class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-lg transition duration-150">
            </div>

            <!-- 年齢 -->
            <div>
              <label for="age" class="block text-sm font-semibold text-slate-700 mb-1.5 flex items-center">
                年齢 <span class="text-red-500 ml-1">*</span>
              </label>
              <input type="number" id="age" name="age" min="15" max="100" placeholder="例: 20" 
                     class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-lg transition duration-150">
            </div>

            <!-- 性別 -->
            <div>
              <label for="gender" class="block text-sm font-semibold text-slate-700 mb-1.5 flex items-center">
                性別 <span class="text-red-500 ml-1">*</span>
              </label>
              <select id="gender" name="gender" 
                      class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-lg bg-white transition duration-150">
                <option value="" disabled selected>選択してください</option>
                <option value="男性">男性</option>
                <option value="女性">女性</option>
                <option value="その他">その他</option>
                <option value="回答しない">回答しない</option>
              </select>
            </div>
          </div>

          <!-- エラーメッセージ用エリア -->
          <div id="error-message" class="text-red-500 text-sm font-bold mb-4 hidden flex items-center bg-red-50 p-3 rounded-lg border border-red-200">
            <svg class="h-5 w-5 mr-1.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span id="error-text"></span>
          </div>
        </div>
      `,
      choices: ['情報を登録して調査説明へ進む'],
      button_html: '<button id="btn-submit-profile" class="jspsych-btn btn-next mx-auto block">%choice%</button>',
      on_load: function() {
        const submitBtn = document.getElementById('btn-submit-profile');
        submitBtn.addEventListener('click', function(e) {
          const studentId = document.getElementById('student_id').value.trim();
          const age = document.getElementById('age').value.trim();
          const gender = document.getElementById('gender').value;
          const errorDiv = document.getElementById('error-message');
          const errorText = document.getElementById('error-text');

          if (!studentId || !age || !gender) {
            e.stopPropagation();
            errorText.textContent = 'すべての必須項目(*)を入力または選択してください。';
            errorDiv.classList.remove('hidden');
            return;
          }

          if (isNaN(age) || parseInt(age) <= 0) {
            e.stopPropagation();
            errorText.textContent = '年齢は正しい数値で入力してください。';
            errorDiv.classList.remove('hidden');
            return;
          }

          jsPsych.data.addProperties({
            student_id: studentId,
            age: parseInt(age),
            gender: gender
          });
        }, true);
      }
    };
    timeline.push(profile_form);

    // Yes/No 質問表示テンプレート（上部に進行バー付き）
    function makeQuestionTrial(qObj, index, total, category = "dummy") {
      const progressPercent = Math.round((index / total) * 100);
      return {
        type: jsPsychHtmlButtonResponse,
        stimulus: `
          <!-- 上部進捗ヘッダー -->
          <div class="max-w-[750px] w-[95%] mx-auto mt-6 px-1">
            <div class="flex justify-between items-center text-xs font-semibold text-slate-500 mb-2">
              <span>質問進行状況</span>
              <span>${index} / ${total} 問目 (${progressPercent}%)</span>
            </div>
            <div class="w-full bg-slate-200 rounded-full h-1.5 overflow-hidden">
              <div class="bg-indigo-600 h-1.5 rounded-full transition-all duration-300" style="width: ${progressPercent}%"></div>
            </div>
          </div>

          <div class="experiment-card">
            <div class="mb-4">
              <span class="inline-block bg-slate-100 text-slate-600 text-xs font-bold px-2.5 py-1 rounded-full uppercase tracking-wider">
                質問
              </span>
            </div>
            <p class="text-xl font-bold leading-relaxed mb-8 text-slate-800">${qObj.question}</p>
          </div>
        `,
        choices: ['はい (Yes)', 'いいえ (No)'],
        button_html: [
          '<button class="jspsych-btn btn-yes mb-3 md:mb-0 md:mr-4 w-full md:w-auto">%choice%</button>',
          '<button class="jspsych-btn btn-no w-full md:w-auto">%choice%</button>'
        ],
        data: {
          trial_type_detail: 'test',
          question_id: qObj.id,
          question_category: category,
          question_index: index
        },
        on_finish: function(data) {
          data.response_label = data.response === 0 ? 'Yes' : 'No';
        }
      };
    }

    // 3.3 調査説明画面
    const test_instruction = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="experiment-card text-center">
          <div class="flex flex-col items-center mb-6">
            <div class="p-3 bg-emerald-50 text-emerald-600 rounded-full mb-4">
              <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">判断調査の開始</h1>
          </div>
          <p class="mb-6 leading-relaxed text-slate-600 text-left text-sm md:text-base">
            これから、日常的な生活習慣や物事の選択傾向に関するいくつかの質問が1画面に1問ずつ表示されます。<br><br>
            あまり深く考え込まず、あなたの心の中の直感に従って、<br>
            <strong class="text-slate-800 font-semibold border-b-2 border-emerald-300">できるだけ素早くスムーズに</strong>【はい (Yes)】または【いいえ (No)】でお答えください。
          </p>
        </div>
      `,
      choices: ['調査を開始する'],
      button_html: '<button class="jspsych-btn btn-next mx-auto block">%choice%</button>'
    };
    timeline.push(test_instruction);

    // ----------------------------------------------------
    // 4. ランダム割り当てに応じた質問順序の適用（合計7問）
    // ----------------------------------------------------
    const total_trials_count = 7;

    if (group === 0) {
      // --- 条件1（A→B順） ---
      timeline.push(makeQuestionTrial(target1_A, 1, total_trials_count, "target1_A_study_time"));
      timeline.push(makeQuestionTrial(target1_B, 2, total_trials_count, "target1_B_study_cost"));
      timeline.push(makeQuestionTrial(dummy_questions[0], 3, total_trials_count, "dummy"));
      timeline.push(makeQuestionTrial(dummy_questions[1], 4, total_trials_count, "dummy"));
      timeline.push(makeQuestionTrial(target2_A, 5, total_trials_count, "target2_A_media_time"));
      timeline.push(makeQuestionTrial(target2_B, 6, total_trials_count, "target2_B_media_cost"));
      timeline.push(makeQuestionTrial(dummy_questions[2], 7, total_trials_count, "dummy"));
    } else {
      // --- 条件2（B→A順） ---
      timeline.push(makeQuestionTrial(target1_B, 1, total_trials_count, "target1_B_study_cost"));
      timeline.push(makeQuestionTrial(target1_A, 2, total_trials_count, "target1_A_study_time"));
      timeline.push(makeQuestionTrial(dummy_questions[0], 3, total_trials_count, "dummy"));
      timeline.push(makeQuestionTrial(dummy_questions[1], 4, total_trials_count, "dummy"));
      timeline.push(makeQuestionTrial(target2_B, 5, total_trials_count, "target2_B_media_cost"));
      timeline.push(makeQuestionTrial(target2_A, 6, total_trials_count, "target2_A_media_time"));
      timeline.push(makeQuestionTrial(dummy_questions[2], 7, total_trials_count, "dummy"));
    }

    // ----------------------------------------------------
    // 5. 理解度チェック 兼 送信トリガー画面
    // ----------------------------------------------------
    const check_trial = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="experiment-card">
          <div class="flex items-center space-x-3 mb-6 border-b pb-4">
            <div class="p-2 bg-purple-50 text-purple-600 rounded-lg">
              <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
              </svg>
            </div>
            <h1 class="text-xl font-bold text-slate-800">最後に確認の質問です</h1>
          </div>
          
          <p class="mb-5 leading-relaxed text-slate-600 text-sm">
            今回の本番課題に回答する際、あなたに対してあらかじめ伝えられていた「回答のルール」として最も当てはまるものを、以下から1つ選んでください。
          </p>
          
          <div class="space-y-3 mb-6">
            <label class="flex items-start p-4 rounded-xl border border-slate-200 hover:bg-slate-50 cursor-pointer transition-all">
              <input type="radio" name="rule_check" value="0" class="mt-1 mr-3 h-4 w-4 text-indigo-600 border-slate-300 focus:ring-indigo-500">
              <span class="text-sm font-medium text-slate-700 leading-normal">できるだけ熟考し、非常に時間をかけて客観的根拠をもとに答える。</span>
            </label>
            <label class="flex items-start p-4 rounded-xl border border-slate-200 hover:bg-slate-50 cursor-pointer transition-all">
              <input type="radio" name="rule_check" value="1" class="mt-1 mr-3 h-4 w-4 text-indigo-600 border-slate-300 focus:ring-indigo-500">
              <span class="text-sm font-medium text-slate-700 leading-normal">あまり深く考え込まず、直感的に、できるだけ素早く答える。</span>
            </label>
            <label class="flex items-start p-4 rounded-xl border border-slate-200 hover:bg-slate-50 cursor-pointer transition-all">
              <input type="radio" name="rule_check" value="2" class="mt-1 mr-3 h-4 w-4 text-indigo-600 border-slate-300 focus:ring-indigo-500">
              <span class="text-sm font-medium text-slate-700 leading-normal">自分自身の本音ではなく、一般的な社会の平均を推測して答える。</span>
            </label>
          </div>
          
          <div id="error-message-check" class="text-red-500 text-sm font-bold mb-4 hidden flex items-center bg-red-50 p-3 rounded-lg border border-red-200">
            <svg class="h-5 w-5 mr-1.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span>回答を選択してください。</span>
          </div>
        </div>
      `,
      choices: ['回答を送信して実験を終了する'],
      button_html: '<button id="btn-submit-check" class="jspsych-btn btn-next mx-auto block">%choice%</button>',
      on_load: function() {
        const submitBtn = document.getElementById('btn-submit-check');
        submitBtn.addEventListener('click', function(e) {
          const selected = document.querySelector('input[name="rule_check"]:checked');
          const errorDiv = document.getElementById('error-message-check');

          if (!selected) {
            e.stopPropagation();
            errorDiv.classList.remove('hidden');
            return;
          }
          
          // 一時的プロパティに保存
          jsPsych.data.addProperties({
            temp_check_response: parseInt(selected.value)
          });
        }, true);
      },
      data: {
        question_id: "comprehension_check"
      },
      on_finish: function(data) {
        const responseVal = jsPsych.data.get().select('temp_check_response').values[0];
        data.response = responseVal;
        data.correct = (responseVal === 1);
      }
    };
    timeline.push(check_trial);

    // 実験タイムラインの起動
    jsPsych.run(timeline);

    // ----------------------------------------------------
    // 7. GASへの構造化データ送信処理
    // ----------------------------------------------------
    async function sendDataToGAS(data) {
      const targetDiv = document.getElementById('jspsych-target');
      
      targetDiv.innerHTML = `
        <div class="experiment-card text-center">
          <div class="loader"></div>
          <h2 class="text-xl font-bold mb-2 text-slate-800">データをスプレッドシートに送信中...</h2>
          <p class="text-slate-500 text-sm">画面を閉じずにそのまま少々お待ちください。</p>
        </div>
      `;

      // 共通データの抽出
      const studentId = data.select('student_id').values[0] || "N/A";
      const age = data.select('age').values[0] || "N/A";
      const gender = data.select('gender').values[0] || "N/A";
      const assignedGroup = data.select('assigned_group').values[0] || "UNKNOWN";

      // 総所要時間の計算（秒単位）
      const endTime = performance.now();
      const rtTotal = Math.round((endTime - startTime) / 1000);

      // 理解度チェックの確認
      let isCheckCorrect = "UNKNOWN";
      const checkTrial = data.filter({question_id: 'comprehension_check'}).values()[0];
      if (checkTrial) {
        isCheckCorrect = checkTrial.correct ? "CORRECT" : "INCORRECT";
      }

      // ターゲット質問回答の抽出
      const getTrialData = (qId) => {
        const trial = data.filter({question_id: qId}).values()[0];
        return trial ? { response: trial.response_label, rt: Math.round(trial.rt) } : { response: "", rt: "" };
      };

      const t1_A = getTrialData("target1_A_study_time");
      const t1_B = getTrialData("target1_B_study_cost");
      const t2_A = getTrialData("target2_A_media_time");
      const t2_B = getTrialData("target2_B_media_cost");

      // GASに送信する「2行分」の配列データを構築
      const payload = [
        {
          category: "学習",
          condition: assignedGroup,
          response_A: t1_A.response,
          response_B: t1_B.response,
          rt_A: t1_A.rt,
          rt_B: t1_B.rt,
          comprehension_check: isCheckCorrect,
          student_id: studentId,
          age: age,
          gender: gender,
          rt_total: rtTotal
        },
        {
          category: "娯楽消費",
          condition: assignedGroup,
          response_A: t2_A.response,
          response_B: t2_B.response,
          rt_A: t2_A.rt,
          rt_B: t2_B.rt,
          comprehension_check: isCheckCorrect,
          student_id: studentId,
          age: age,
          gender: gender,
          rt_total: rtTotal
        }
      ];

      // 通信リトライ関数（最大5回指数バックオフ）
      const fetchWithRetry = async (url, options, retries = 5, delay = 1000) => {
        try {
          const response = await fetch(url, options);
          
          if (options.mode === 'no-cors' || response.type === 'opaque') {
            return { result: "opaque_success" };
          }
          
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          return await response.json();
        } catch (error) {
          if (retries > 0) {
            await new Promise(resolve => setTimeout(resolve, delay));
            return fetchWithRetry(url, options, retries - 1, delay * 2);
          } else {
            throw error;
          }
        }
      };

      try {
        // mode: 'no-cors' で送信し、ブラウザのCORS制限によるリクエスト遮断を完全に防止
        await fetchWithRetry(GAS_WEBAPP_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(payload)
        });
        
        showSuccessScreen(studentId, assignedGroup, isCheckCorrect, payload);
      } catch (error) {
        console.error("データの送信に失敗しました:", error);
        showFailureScreen(studentId, assignedGroup, isCheckCorrect, payload);
      }
    }

    // ----------------------------------------------------
    // 8. 終了画面（デブリーフィング統合版）のレンダリング
    // ----------------------------------------------------

    // 安全なクリップボードコピー用のヘルパー関数
    function copyToClipboard(text) {
      const tempTextArea = document.createElement("textarea");
      tempTextArea.value = text;
      document.body.appendChild(tempTextArea);
      tempTextArea.select();
      try {
        document.execCommand('copy');
        return true;
      } catch (err) {
        console.error('コピーできませんでした:', err);
        return false;
      } finally {
        document.body.removeChild(tempTextArea);
      }
    }

    function showSuccessScreen(id, group, checkResult, payload) {
      const targetDiv = document.getElementById('jspsych-target');

      targetDiv.innerHTML = `
        <div class="experiment-card max-w-[800px]">
          <div class="text-center mb-6">
            <div class="inline-flex p-3 bg-emerald-50 text-emerald-600 rounded-full mb-3">
              <svg class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </div>
            <h1 class="text-3xl font-extrabold mb-2 text-slate-800">実験データ保存完了</h1>
            <p class="text-slate-500 text-sm">回答スプレッドシートへの安全な転送が完了しました。</p>
          </div>
          
          <div class="bg-slate-50 p-5 rounded-xl text-left text-xs text-slate-600 mb-6 space-y-1.5 border border-slate-200">
            <h3 class="font-bold text-slate-700 text-sm mb-1.5 border-b pb-1">送信データの概要</h3>
            <p><strong>学籍番号:</strong> ${id}</p>
            <p><strong>年齢 / 性別:</strong> ${payload[0].age} 歳 / ${payload[0].gender}</p>
            <p><strong>割り当て条件:</strong> 条件 ${group}</p>
            <p><strong>教示理解チェック:</strong> <span class="${checkResult === 'CORRECT' ? 'text-emerald-600 font-bold' : 'text-rose-500 font-bold'}">${checkResult}</span></p>
          </div>

          <div class="border-t pt-6 text-left">
            <h2 class="text-lg font-bold mb-3 text-indigo-600 flex items-center">
              <svg class="h-5 w-5 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              本研究の目的について（デブリーフィング）
            </h2>
            <p class="mb-4 text-xs leading-relaxed text-slate-600">
              本調査の本当の目的について説明します。
            </p>
            <p class="mb-4 text-sm leading-relaxed text-slate-600">
              本研究は、提示する「質問の順序」が、人間の評価判断に与える影響（順序効果）を検証することを目的としています。
              ベイズ推論を基礎とする伝統的な「古典確率モデル」では、質問の順序が変わっても、本来各質問に対するYes/Noの確率は変化しないはずです。しかし、実際の認知判断は直前に提示された質問の「文脈」に強く干渉されます。これを、近年認知心理学で注目されている「量子力学の数理的な枠組み（非可換性）」を適用した<strong>「量子認知モデル」</strong>を用いて、一貫性のある数理モデルとして記述できるかを比較検討しています。
            </p>
            <p class="mb-4 text-sm leading-relaxed text-slate-600">
              事前の開示により直感的な評価回答が歪むのを防ぐため、事前説明では研究課題を曖昧にしていましたことをご了承ください。
            </p>
          </div>
          
          <div class="text-center mt-8 border-t pt-5">
            <p class="text-xs text-slate-400">データは安全に記録されました。この画面を閉じてブラウザを終了してください。</p>
          </div>
        </div>
      `;
    }

    function showFailureScreen(id, group, checkResult, payload) {
      const targetDiv = document.getElementById('jspsych-target');
      const payloadString = JSON.stringify(payload, null, 2);

      targetDiv.innerHTML = `
        <div class="experiment-card max-w-[800px]">
          <div class="text-center mb-6">
            <div class="inline-flex p-3 bg-amber-50 text-amber-600 rounded-full mb-3">
              <svg class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
              </svg>
            </div>
            <h1 class="text-2xl font-extrabold mb-2 text-slate-800">ネットワーク通信エラー</h1>
            <p class="text-red-500 text-sm">スプレッドシートへの自動送信中にネットワーク遮断が検知されました。</p>
          </div>
          
          <div class="bg-amber-50 p-5 rounded-xl text-left text-sm text-amber-800 mb-6 border border-amber-200">
            <p class="font-bold mb-2">【実験参加者の方へのお願い】</p>
            <p class="leading-relaxed text-xs">
              大変お手数ですが、実験データが反映されるよう、下の<strong>「回答データをコピーする」</strong>ボタンをクリックし、表示された内容をそのまま実験担当者にメールでお送りいただくか、プリント記載の責任者までご連絡ください。
            </p>
            <div class="mt-4 flex flex-col sm:flex-row gap-2">
              <button id="btn-copy-data" class="bg-amber-600 text-white font-bold py-2 px-4 rounded-lg text-xs hover:bg-amber-700 active:scale-[0.98] transition">
                回答データをコピーする
              </button>
              <span id="copy-status" class="text-xs text-amber-700 flex items-center font-semibold"></span>
            </div>
          </div>

          <div class="bg-slate-50 p-4 rounded-lg text-left text-xs text-slate-600 mb-6 border border-slate-200">
            <h3 class="font-bold text-slate-700 text-sm mb-1">現在の回答ログ</h3>
            <pre class="bg-slate-800 text-emerald-400 p-3 rounded-lg overflow-x-auto text-[10px] max-h-[150px] leading-relaxed">${payloadString}</pre>
          </div>

          <div class="border-t pt-6 text-left">
            <h2 class="text-lg font-bold mb-3 text-indigo-600">本研究の目的について（デブリーフィング）</h2>
            <p class="mb-4 text-sm leading-relaxed text-slate-600">
              本研究は、提示する「質問の順序」が、人間の評価判断に与える影響（順序効果）を検証することを目的としています。
              前に受けた情報が次の判断に干渉するプロセスを、物理学の数学系を応用した<strong>「量子認知モデル」</strong>を用いて数理的整合性を検証しています。
            </p>
          </div>
        </div>
      `;

      // コピーボタンのイベントリスナー設定
      const copyBtn = document.getElementById('btn-copy-data');
      const copyStatus = document.getElementById('copy-status');
      
      copyBtn.addEventListener('click', function() {
        const success = copyToClipboard(payloadString);
        if (success) {
          copyStatus.innerHTML = `
            <svg class="h-4 w-4 text-emerald-600 mr-1 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
            クリップボードにコピーしました！
          `;
          copyStatus.classList.remove('text-amber-700');
          copyStatus.classList.add('text-emerald-700');
        } else {
          copyStatus.textContent = "コピーに失敗しました。お手数ですが枠内を直接選択してコピーしてください。";
        }
      });
    }
  </script>
