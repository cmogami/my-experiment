<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>意思決定と判断に関する調査実験</title>
  
  <!-- jsPsych CDNの読み込み -->
  <script src="https://unpkg.com/jspsych@7.3.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.2"></script>
  
  <!-- Tailwind CSSによるUIスタイリング -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- jsPsychのデフォルトスタイルシート -->
  <link href="https://unpkg.com/jspsych@7.3.0/css/jspsych.css" rel="stylesheet" type="text/css">

  <style>
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
      user-select: none;
    }
    .jspsych-btn {
      padding: 0.75rem 2rem !important;
      font-size: 1.1rem !important;
      font-weight: 600 !important;
      border-radius: 0.5rem !important;
      transition: all 0.2s ease !important;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1) !important;
    }
    .jspsych-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1) !important;
    }
    .experiment-card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
      padding: 3rem 2rem;
      max-width: 700px;
      width: 90%;
      margin: 2rem auto;
      text-align: left;
    }
    .btn-yes {
      background-color: #3b82f6 !important;
      color: white !important;
      border: none !important;
    }
    .btn-yes:hover {
      background-color: #2563eb !important;
    }
    .btn-no {
      background-color: #ef4444 !important;
      color: white !important;
      border: none !important;
    }
    .btn-no:hover {
      background-color: #dc2626 !important;
    }
    .btn-next {
      background-color: #10b981 !important;
      color: white !important;
      border: none !important;
    }
    .btn-next:hover {
      background-color: #059669 !important;
    }
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="jspsych-target" class="min-h-screen flex items-center justify-center p-4"></div>

  <script>
    // ----------------------------------------------------
    // GAS送信用のエンドポイント設定（指定のURLに変更済み）
    // ----------------------------------------------------
    const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzbLx8Yb79v1vULc2XKngmBGL2CsFMD5YDBSImjkd6sZlJM1TZUGswztADXBCiObss8/exec";

    // ----------------------------------------------------
    // 1. 実験初期設定・グループ割り当て
    // ----------------------------------------------------
    const jsPsych = initJsPsych({
      display_element: 'jspsych-target',
      on_finish: function() {
        // 実験終了時にスプレッドシートへ自動送信し、完了画面を出す
        sendDataToGAS(jsPsych.data.get());
      }
    });

    // グループのランダム決定 (0: A→B順 [条件1] / 1: B→A順 [条件2])
    const group = Math.floor(Math.random() * 2);
    const groupName = group === 0 ? "条件1（A→B順）" : "条件2（B→A順）";
    
    // 参加者のシステム管理用一意IDを生成（万一学籍番号に重複があった場合の保険）
    const systemId = 'SYS_' + Math.random().toString(36).substring(2, 10).toUpperCase();

    // 共通データにグループとシステムIDを初期保存
    jsPsych.data.addProperties({
      system_id: systemId,
      assigned_group: groupName
    });

    const timeline = [];

    // ----------------------------------------------------
    // 2. 質問文の定義
    // ----------------------------------------------------
    
    // 練習問題（身近でニュートラルなもの）
    const practice_questions = [
      {
        question: "あなたは、大学の講義においてオンライン講義（オンデマンド型など）よりも、教室での対面講義の方が好きですか？",
        id: "practice_1"
      },
      {
        question: "あなたは、普段の生活において、朝型（早起き）よりも夜型（夜更かし）の傾向があると思いますか？",
        id: "practice_2"
      }
    ];

    // ダミー質問（文脈リセット用フィラー）
    const dummy_questions = [
      {
        question: "あなたは、お米（ごはん）よりもパンを朝食に食べることの方が多いですか？",
        id: "dummy_1"
      },
      {
        question: "あなたは、普段映画を見るとき、字幕版よりも日本語吹替版を選ぶことが多いですか？",
        id: "dummy_2"
      },
      {
        question: "あなたは、実生活において犬派（犬が好き）よりも猫派（猫が好き）ですか？",
        id: "dummy_3"
      }
    ];

    // ターゲット質問ペア1：企業の魅力度評価 (ベンチャーA vs 大手B)
    const target1_A = {
      question: "リスクはあるが、若いうちから裁量権を持って成長できる「ベンチャー企業」は、就職先として魅力的だと思いますか？",
      id: "target1_A_venture"
    };
    const target1_B = {
      question: "変化は少ないが、福利厚生が充実しており定年まで安定して働ける「大手企業」は、就職先として魅力的だと思いますか？",
      id: "target1_B_major"
    };

    // ターゲット質問ペア2：ライフスタイル（タイパA vs コスパB）
    const target2_A = {
      question: "時間は有限であるため、お金を余分に払ってでも、移動時間を短縮したり効率化できたりするサービス（特急、デリバリー、有料アプリなど）を積極的に利用すべきだと思いますか？",
      id: "target2_A_time"
    };
    const target2_B = {
      question: "学生の間はお金が限られているため、多少の時間や手間がかかっても、できるだけ安く済ませる工夫（各駅停車、自炊、無料版の利用など）を徹底すべきだと思いますか？",
      id: "target2_B_money"
    };

    // ----------------------------------------------------
    // 3. 実験画面（トライアル）の構築
    // ----------------------------------------------------

    // 3.1 同意説明画面
    const consent = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="experiment-card">
          <h1 class="text-2xl font-bold mb-4 border-b pb-2 text-blue-600">調査へのご協力のお願い</h1>
          <p class="mb-4 text-sm text-slate-600 leading-relaxed">
            本調査は、日常的な事象に対する人々の評価や判断の傾向を調べるための学術研究（卒業研究）です。所要時間は10〜15分程度です。
          </p>
          <h2 class="text-lg font-semibold mb-2">【注意事項と同意事項】</h2>
          <ul class="list-disc pl-5 mb-6 text-sm text-slate-600 space-y-2">
            <li>この調査への参加は完全に自由です。途中で回答を中止したくなったり、画面を閉じたりしても何らかの不利益を被ることはありません。</li>
            <li>回答データはすべて個人が特定できない形式で統計的に処理され、卒論などの学術的公表目的のみで使用されます。</li>
            <li>途中でブラウザの「戻る」ボタンを押すと、正常にデータが記録されなくなりますので、最後まで進めていただきますようお願いいたします。</li>
            <li>集中して一気に回答できる環境で進めてください。</li>
          </ul>
          <p class="font-medium text-slate-700">以上の内容を十分に理解し、同意して調査に参加していただけますか？</p>
        </div>
      `,
      choices: ['同意して次へ進む'],
      button_html: '<button class="jspsych-btn btn-next mx-auto block">%choice%</button>'
    };
    timeline.push(consent);

    // 3.2 学籍番号・年齢・性別 入力画面
    const profile_form = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="experiment-card">
          <h1 class="text-2xl font-bold mb-6 border-b pb-2 text-indigo-600">参加者情報のご入力</h1>
          <p class="mb-6 text-sm text-slate-500">
            実験の統計処理およびデータの整理のため、以下の項目についてご回答をお願いいたします。<br>
            ※個人情報は厳重に管理され、本研究以外の目的で使用されることは一切ありません。
          </p>
          
          <div class="space-y-4 mb-6">
            <!-- 学籍番号 -->
            <div>
              <label for="student_id" class="block text-sm font-semibold text-slate-700 mb-1">学籍番号 <span class="text-red-500">*</span></label>
              <input type="text" id="student_id" name="student_id" placeholder="例: 12345678" 
                     class="w-full px-4 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg">
            </div>

            <!-- 年齢 -->
            <div>
              <label for="age" class="block text-sm font-semibold text-slate-700 mb-1">年齢 <span class="text-red-500">*</span></label>
              <input type="number" id="age" name="age" min="15" max="100" placeholder="例: 20" 
                     class="w-full px-4 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg">
            </div>

            <!-- 性別 -->
            <div>
              <label for="gender" class="block text-sm font-semibold text-slate-700 mb-1">性別 <span class="text-red-500">*</span></label>
              <select id="gender" name="gender" 
                      class="w-full px-4 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg bg-white">
                <option value="" disabled selected>選択してください</option>
                <option value="男性">男性</option>
                <option value="女性">女性</option>
                <option value="その他">その他</option>
                <option value="回答しない">回答しない</option>
              </select>
            </div>
          </div>

          <!-- エラーメッセージ用エリア -->
          <div id="error-message" class="text-red-500 text-sm font-bold mb-4 hidden"></div>
        </div>
      `,
      choices: ['情報を登録して練習へ進む'],
      button_html: '<button id="btn-submit-profile" class="jspsych-btn btn-next mx-auto block">%choice%</button>',
      on_load: function() {
        const submitBtn = document.getElementById('btn-submit-profile');
        submitBtn.addEventListener('click', function(e) {
          const studentId = document.getElementById('student_id').value.trim();
          const age = document.getElementById('age').value.trim();
          const gender = document.getElementById('gender').value;
          const errorDiv = document.getElementById('error-message');

          if (!studentId || !age || !gender) {
            e.stopPropagation();
            errorDiv.textContent = '※すべての必須項目(*)を入力または選択してください。';
            errorDiv.classList.remove('hidden');
            return;
          }

          if (isNaN(age) || parseInt(age) <= 0) {
            e.stopPropagation();
            errorDiv.textContent = '※年齢は正しい数値で入力してください。';
            errorDiv.classList.remove('hidden');
            return;
          }

          jsPsych.data.addProperties({
            student_id: studentId,
            age: parseInt(age),
            gender: gender
          });
        }, true);
      }
    };
    timeline.push(profile_form);

    // 3.3 練習開始説明
    const practice_instruction = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="experiment-card text-center">
          <h1 class="text-2xl font-bold mb-4 text-slate-800">練習を始めます</h1>
          <p class="mb-6 leading-relaxed text-slate-600">
            これから、いくつかの日常的な事柄に関する質問が1画面に1問ずつ表示されます。<br>
            それぞれの質問に対し、あなた自身の考えに最も近いボタン（<strong class="text-blue-500">はい [Yes]</strong> または <strong class="text-red-500">いいえ [No]</strong>）を選んでください。<br><br>
            あまり深く考え込まず、<strong>直感的に、できるだけスムーズに</strong>回答してください。
          </p>
          <p class="text-sm text-emerald-600 font-bold mb-4">※まずは操作に慣れるための「練習」を2回行います。</p>
        </div>
      `,
      choices: ['練習へ進む'],
      button_html: '<button class="jspsych-btn btn-next mx-auto block">%choice%</button>'
    };
    timeline.push(practice_instruction);

    // Yes/No 質問表示テンプレート
    function makeQuestionTrial(qObj, isPractice = false, category = "dummy") {
      return {
        type: jsPsychHtmlButtonResponse,
        stimulus: `
          <div class="experiment-card">
            <div class="text-xs font-semibold text-slate-400 mb-2">${isPractice ? '練習問題' : '本番調査'}</div>
            <p class="text-xl font-bold leading-relaxed mb-8 text-slate-800">${qObj.question}</p>
          </div>
        `,
        choices: ['はい (Yes)', 'いいえ (No)'],
        button_html: [
          '<button class="jspsych-btn btn-yes mr-4">%choice%</button>',
          '<button class="jspsych-btn btn-no ml-4">%choice%</button>'
        ],
        data: {
          trial_type_detail: isPractice ? 'practice' : 'test',
          question_id: qObj.id,
          question_category: category
        },
        on_finish: function(data) {
          data.response_label = data.response === 0 ? 'Yes' : 'No';
        }
      };
    }

    // 練習トライアルの登録
    practice_questions.forEach(q => {
      timeline.push(makeQuestionTrial(q, true, "practice"));
    });

    // 3.4 本番開始説明
    const test_instruction = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="experiment-card text-center">
          <h1 class="text-2xl font-bold mb-4 text-slate-800">本番調査の開始</h1>
          <p class="mb-6 leading-relaxed text-slate-600">
            練習は以上です。ここから本番の判断調査が始まります。<br><br>
            練習と同様に、あまり考え込まず、あなたの心の中の直感に従って、<br>
            <strong>できるだけ素早くスムーズに</strong>【はい】または【いいえ】でお答えください。
          </p>
        </div>
      `,
      choices: ['本番調査を始める'],
      button_html: '<button class="jspsych-btn btn-next mx-auto block">%choice%</button>'
    };
    timeline.push(test_instruction);

    // ----------------------------------------------------
    // 4. ランダム割り当てに応じた質問順序の適用
    // ----------------------------------------------------
    if (group === 0) {
      // --- 条件1（A→B順） ---
      timeline.push(makeQuestionTrial(target1_A, false, "target1_A_venture"));
      timeline.push(makeQuestionTrial(target1_B, false, "target1_B_major"));
      timeline.push(makeQuestionTrial(dummy_questions[0], false, "dummy"));
      timeline.push(makeQuestionTrial(dummy_questions[1], false, "dummy"));
      timeline.push(makeQuestionTrial(target2_A, false, "target2_A_time"));
      timeline.push(makeQuestionTrial(target2_B, false, "target2_B_money"));
      timeline.push(makeQuestionTrial(dummy_questions[2], false, "dummy"));
    } else {
      // --- 条件2（B→A順） ---
      timeline.push(makeQuestionTrial(target1_B, false, "target1_B_major"));
      timeline.push(makeQuestionTrial(target1_A, false, "target1_A_venture"));
      timeline.push(makeQuestionTrial(dummy_questions[0], false, "dummy"));
      timeline.push(makeQuestionTrial(dummy_questions[1], false, "dummy"));
      timeline.push(makeQuestionTrial(target2_B, false, "target2_B_money"));
      timeline.push(makeQuestionTrial(target2_A, false, "target2_A_time"));
      timeline.push(makeQuestionTrial(dummy_questions[2], false, "dummy"));
    }

    // ----------------------------------------------------
    // 5. 理解度チェック
    // ----------------------------------------------------
    const check_trial = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="experiment-card">
          <h1 class="text-xl font-bold mb-4 text-slate-800 border-b pb-2">最後に確認の質問です</h1>
          <p class="mb-6 leading-relaxed text-slate-600">
            今回の本番課題に回答する際、あなたに対してあらかじめ伝えられていた「回答のルール」として最も当てはまるものを、以下から1つ選んでください。
          </p>
        </div>
      `,
      choices: [
        'できるだけ熟考し、非常に時間をかけて客観的根拠をもとに答える。',
        'あまり深く考え込まず、直感的に、できるだけ素早く答える。',
        '自分自身の本音ではなく、一般的な社会の平均を推測して答える。'
      ],
      button_html: [
        '<button class="jspsych-btn bg-slate-100 hover:bg-slate-200 text-slate-700 block w-full mb-3 text-left p-4 rounded-lg font-medium border border-slate-200 transition-all">%choice%</button>',
        '<button class="jspsych-btn bg-slate-100 hover:bg-slate-200 text-slate-700 block w-full mb-3 text-left p-4 rounded-lg font-medium border border-slate-200 transition-all">%choice%</button>',
        '<button class="jspsych-btn bg-slate-100 hover:bg-slate-200 text-slate-700 block w-full mb-3 text-left p-4 rounded-lg font-medium border border-slate-200 transition-all">%choice%</button>'
      ],
      data: {
        question_id: "comprehension_check"
      },
      on_finish: function(data) {
        data.correct = (data.response === 1);
      }
    };
    timeline.push(check_trial);

    // ----------------------------------------------------
    // 6. デブリーフィング画面
    // ----------------------------------------------------
    const debriefing = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="experiment-card">
          <h1 class="text-2xl font-bold mb-4 border-b pb-2 text-indigo-600">実験お疲れ様でした（デブリーフィング）</h1>
          <p class="mb-4 text-sm leading-relaxed text-slate-600">
            本調査の本当の目的について説明します。
          </p>
          <p class="mb-4 text-sm leading-relaxed text-slate-600">
            本研究は、提示する「質問の順序」が、人間の評価判断に与える影響（順序効果）を検証することを目的としています。
            ベイズ推論を基礎とする伝統的な「古典確率モデル」では、質問の順序が変わっても、本来各質問に対するYes/Noの確率は変化しないはずです。しかし、人間の認知判断は前に提示された質問の「文脈」に強く干渉されます。これを、近年認知心理学で注目されている「量子力学の数理的な枠組み（非可換性）」を適用した<strong>「量子認知モデル」</strong>を用いて、一貫性のある数理モデルとして記述できるかを比較検討しています。
          </p>
          <p class="mb-4 text-sm leading-relaxed text-slate-600">
            事前の開示により直感的な評価回答が歪むのを防ぐため、事前説明では研究課題を曖昧にしていましたことをご了承ください。
          </p>
          <p class="text-xs text-red-500 font-bold mb-6">
            ※「実験データを完了して保存する」をクリックすると、データがGoogleスプレッドシートへ安全に送信されます。
          </p>
        </div>
      `,
      choices: ['実験データを完了して保存する'],
      button_html: '<button class="jspsych-btn btn-next mx-auto block">%choice%</button>'
    };
    timeline.push(debriefing);

    // 実験タイムラインの起動
    jsPsych.run(timeline);

    // ----------------------------------------------------
    // 7. GASへのデータ送信処理とリトライ機能（指数バックオフ）
    // ----------------------------------------------------
    async function sendDataToGAS(data) {
      const targetDiv = document.getElementById('jspsych-target');
      
      targetDiv.innerHTML = `
        <div class="experiment-card text-center">
          <div class="loader"></div>
          <h2 class="text-xl font-bold mb-2 text-slate-800">データをスプレッドシートに送信中...</h2>
          <p class="text-slate-500 text-sm">画面を閉じずにそのまま少々お待ちください。</p>
        </div>
      `;

      const studentId = data.select('student_id').values[0] || "N/A";
      const age = data.select('age').values[0] || "N/A";
      const gender = data.select('gender').values[0] || "N/A";

      const testTrials = data.filter([{trial_type_detail: 'test'}, {question_id: 'comprehension_check'}]);
      let isCheckCorrect = "UNKNOWN";

      const checkTrial = data.filter({question_id: 'comprehension_check'}).values()[0];
      if (checkTrial) {
        isCheckCorrect = checkTrial.correct ? "CORRECT" : "INCORRECT";
      }

      const payload = testTrials.values().map(t => {
        return {
          system_id: t.system_id,
          student_id: studentId,
          age: age,
          gender: gender,
          assigned_group: t.assigned_group,
          trial_type_detail: t.trial_type_detail || "check",
          question_id: t.question_id,
          question_category: t.question_category || "none",
          response_index: t.response,
          response_text: t.response_label || (t.response === 1 ? "Option2" : "Option1"),
          rt: Math.round(t.rt),
          comprehension_check: isCheckCorrect,
          timestamp: new Date().toISOString()
        };
      });

      // 通信リトライ関数（最大5回指数バックオフ）
      const fetchWithRetry = async (url, options, retries = 5, delay = 1000) => {
        try {
          const response = await fetch(url, options);
          
          // mode: 'no-cors' または不透明なレスポンス（opaque）の場合は、
          // CORSによるダミーレスポンス（status: 0, ok: false）になるため、
          // エラーチェックを行わずにそのまま正常終了として扱います。
          if (options.mode === 'no-cors' || response.type === 'opaque') {
            return { result: "opaque_success" };
          }
          
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          return await response.json();
        } catch (error) {
          if (retries > 0) {
            await new Promise(resolve => setTimeout(resolve, delay));
            return fetchWithRetry(url, options, retries - 1, delay * 2);
          } else {
            throw error;
          }
        }
      };

      try {
        // modeを 'no-cors' に変更して、ブラウザ側CORSポリシーによる
        // Googleリダイレクトのブロック（Load failedエラー）を完全に防止します。
        await fetchWithRetry(GAS_WEBAPP_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(payload)
        });
        
        showSuccessScreen(studentId, groupName, isCheckCorrect, data);
      } catch (error) {
        console.error("データの送信に失敗しました:", error);
        showFailureScreen(studentId, groupName, isCheckCorrect, data);
      }
    }

    // ----------------------------------------------------
    // 8. 終了画面のレンダリング
    // ----------------------------------------------------

    function showSuccessScreen(id, group, checkResult, fullData) {
      const targetDiv = document.getElementById('jspsych-target');
      const csvUri = generateCsvUri(fullData);

      targetDiv.innerHTML = `
        <div class="experiment-card text-center">
          <svg class="mx-auto h-16 w-16 text-emerald-500 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <h1 class="text-3xl font-bold mb-2 text-slate-800">実験データ保存完了！</h1>
          <p class="text-slate-500 mb-6">スプレッドシートへのデータ送信が完了しました。ご協力ありがとうございました。</p>
          
          <div class="bg-slate-50 p-4 rounded-lg text-left text-xs text-slate-600 mb-6 space-y-1 border border-slate-100">
            <p><strong>学籍番号:</strong> ${id}</p>
            <p><strong>年齢:</strong> ${fullData.select('age').values[0] || "N/A"}</p>
            <p><strong>性別:</strong> ${fullData.select('gender').values[0] || "N/A"}</p>
            <p><strong>割り当て条件:</strong> ${group}</p>
            <p><strong>教示理解チェック:</strong> <span class="${checkResult === 'CORRECT' ? 'text-emerald-600 font-bold' : 'text-rose-500 font-bold'}">${checkResult}</span></p>
          </div>

          <div class="border-t pt-6">
            <p class="text-xs text-slate-400 mb-3">バックアップ用としてCSVデータを手元に保存しておきたい場合は、下記からダウンロード可能です。</p>
            <a href="${csvUri}" download="${id}_backup_data.csv" 
               class="inline-block bg-slate-500 text-white font-bold py-2 px-4 rounded shadow-sm hover:bg-slate-600 transition text-sm cursor-pointer">
              ローカルにCSVをダウンロード
            </a>
          </div>
        </div>
      `;
    }

    function showFailureScreen(id, group, checkResult, fullData) {
      const targetDiv = document.getElementById('jspsych-target');
      const csvUri = generateCsvUri(fullData);

      targetDiv.innerHTML = `
        <div class="experiment-card text-center">
          <svg class="mx-auto h-16 w-16 text-amber-500 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
          <h1 class="text-3xl font-bold mb-2 text-slate-800">通信エラーが発生しました</h1>
          <p class="text-red-500 text-sm mb-6">スプレッドシートへの自動送信中にネットワーク接続エラーが起きた可能性があります。</p>
          
          <div class="bg-amber-50 p-4 rounded-lg text-left text-xs text-amber-800 mb-6 border border-amber-200">
            <p class="font-bold mb-1">【実験参加者の方へのお願い】</p>
            <p>大変お手数ですが、以下のボタンをクリックして<strong>CSVデータファイルをダウンロード</strong>し、実験責任者にこのファイル（またはスクリーンショット）を提出してください。</p>
          </div>

          <div class="bg-slate-50 p-4 rounded-lg text-left text-xs text-slate-600 mb-6 space-y-1 border border-slate-100">
            <p><strong>学籍番号:</strong> ${id}</p>
            <p><strong>割り当て条件:</strong> ${group}</p>
          </div>

          <a href="${csvUri}" download="${id}_data.csv" 
             class="inline-block bg-blue-600 text-white font-bold py-3 px-6 rounded-lg shadow-md hover:bg-blue-700 transition duration-200 transform hover:-translate-y-0.5 cursor-pointer">
            CSVデータシートをダウンロード
          </a>
        </div>
      `;
    }

    function generateCsvUri(data) {
      let csvRows = [
        ["SystemID", "StudentID", "Age", "Gender", "Group", "TrialType", "QuestionID", "QuestionCategory", "ResponseIndex", "ResponseText", "ResponseTime_ms", "ComprehensionCheck"]
      ];

      const studentId = data.select('student_id').values[0] || "N/A";
      const age = data.select('age').values[0] || "N/A";
      const gender = data.select('gender').values[0] || "N/A";

      const trials = data.filter([{trial_type_detail: 'test'}, {question_id: 'comprehension_check'}]);
      let isCheckCorrect = "UNKNOWN";

      const checkTrial = data.filter({question_id: 'comprehension_check'}).values()[0];
      if (checkTrial) {
        isCheckCorrect = checkTrial.correct ? "CORRECT" : "INCORRECT";
      }

      trials.values().forEach(t => {
        csvRows.push([
          t.system_id,
          studentId,
          age,
          gender,
          t.assigned_group,
          t.trial_type_detail || "check",
          t.question_id,
          t.question_category || "none",
          t.response,
          t.response_label || (t.response === 1 ? "Option2" : "Option1"),
          Math.round(t.rt),
          isCheckCorrect
        ]);
      });

      const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
      const csvContent = csvRows.map(e => e.map(val => `"${val}"`).join(",")).join("\n");
      const blob = new Blob([bom, csvContent], { type: "text/csv;charset=utf-8;" });
      
      return URL.createObjectURL(blob);
    }
  </script>
