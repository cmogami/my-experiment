<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1-Back & 2-Back 統合ワーキングメモリ課題</title>
  
  <!-- jsPsych 7.3.0 CDN JS and CSS -->
  <script src="https://unpkg.com/jspsych@7.3.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.2"></script>
  <link href="https://unpkg.com/jspsych@7.3.0/css/jspsych.css" rel="stylesheet" type="text/css" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Helvetica Neue', Arial, sans-serif;
      background-color: #f1f5f9;
      color: #0f172a;
      line-height: 1.8;
    }
    
    .jspsych-content {
      max-width: 900px;
      width: 100%;
      padding: 1.5rem;
    }

    .custom-btn {
      background-color: #3b82f6;
      color: white;
      font-weight: 600;
      padding: 0.75rem 2.5rem;
      border-radius: 0.5rem;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      border: none;
      cursor: pointer;
    }
    .custom-btn:hover {
      background-color: #2563eb;
      transform: translateY(-1px);
    }
    .custom-btn:active {
      transform: translateY(1px);
    }

    .choice-btn-same {
      background-color: #10b981;
      color: white;
      font-weight: bold;
      font-size: 1.25rem;
      padding: 1rem 3rem;
      border-radius: 0.75rem;
      transition: all 0.15s ease;
      min-width: 160px;
    }
    .choice-btn-same:active, .choice-btn-same.active-state {
      background-color: #059669;
      transform: scale(0.95);
    }

    .choice-btn-diff {
      background-color: #ef4444;
      color: white;
      font-weight: bold;
      font-size: 1.25rem;
      padding: 1rem 3rem;
      border-radius: 0.75rem;
      transition: all 0.15s ease;
      min-width: 160px;
    }
    .choice-btn-diff:active, .choice-btn-diff.active-state {
      background-color: #dc2626;
      transform: scale(0.95);
    }

    .experiment-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 400px;
      width: 100%;
    }
  </style>
</head>
<body>

  <div id="jspsych-target" class="min-h-screen flex items-center justify-center p-4"></div>

  <script>
    // --- グローバル変数・参加者ID定義 ---
    let participantId = "";

    const GAS_URL = "https://script.google.com/macros/s/AKfycbzfcvLZXs1Vle386kQV2RcX7YW92M6h7mGCpwV0VwSdlE-zdx--8CfwgT7YGysXL1Rrqg/exec";

    // --- 1-Back配列生成アルゴリズム (20試行, ターゲット厳密に6回) ---
    function generate1BackSequence() {
      const letters = ['A', 'B', 'C', 'D', 'E'];
      const totalTrials = 20;
      const targetCount = 6;
      
      let sequence = new Array(totalTrials);
      let isTarget = new Array(totalTrials).fill(false);

      let indices = [];
      for (let i = 1; i < totalTrials; i++) {
        indices.push(i);
      }
      
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }

      for (let i = 0; i < targetCount; i++) {
        isTarget[indices[i]] = true;
      }

      for (let i = 0; i < totalTrials; i++) {
        if (i === 0) {
          sequence[i] = letters[Math.floor(Math.random() * letters.length)];
        } else if (isTarget[i]) {
          sequence[i] = sequence[i - 1];
        } else {
          let availableLetters = letters.filter(l => l !== sequence[i - 1]);
          sequence[i] = availableLetters[Math.floor(Math.random() * availableLetters.length)];
        }
      }

      return sequence.map((letter, idx) => {
        return {
          trial_index: idx + 1,
          stimulus: letter,
          is_target: idx === 0 ? false : (letter === sequence[idx - 1])
        };
      });
    }

    // --- 2-Back配列生成アルゴリズム (20試行, ターゲット厳密に6回) ---
    function generate2BackSequence() {
      const letters = ['A', 'B', 'C', 'D', 'E'];
      const totalTrials = 20;
      const targetCount = 6;
      
      let sequence = new Array(totalTrials);
      let isTarget = new Array(totalTrials).fill(false);

      // 最初の2つ(インデックス0, 1)は非ターゲット固定
      let indices = [];
      for (let i = 2; i < totalTrials; i++) {
        indices.push(i);
      }
      
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }

      for (let i = 0; i < targetCount; i++) {
        isTarget[indices[i]] = true;
      }

      for (let i = 0; i < totalTrials; i++) {
        if (i === 0 || i === 1) {
          sequence[i] = letters[Math.floor(Math.random() * letters.length)];
        } else if (isTarget[i]) {
          sequence[i] = sequence[i - 2];
        } else {
          let availableLetters = letters.filter(l => l !== sequence[i - 2]);
          sequence[i] = availableLetters[Math.floor(Math.random() * availableLetters.length)];
        }
      }

      return sequence.map((letter, idx) => {
        return {
          trial_index: idx + 1,
          stimulus: letter,
          is_target: idx < 2 ? false : (letter === sequence[idx - 2])
        };
      });
    }

    const trialSequence1Back = generate1BackSequence();
    const trialSequence2Back = generate2BackSequence();

    // --- jsPsych 初期化 ---
    const jsPsych = initJsPsych({
      display_element: 'jspsych-target',
      on_finish: function() {
        sendDataToGAS();
      }
    });

    const timeline = [];

    // --- 1. 参加者情報（IDのみ）入力画面 ---
    const participant_info_trial = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 max-w-md mx-auto text-left">
          <h2 class="text-2xl font-bold text-slate-800 mb-6 text-center">実験の準備</h2>
          <p class="text-slate-500 text-sm mb-6 text-center">実験で使用する参加者IDを入力してください。</p>
          
          <div class="space-y-4">
            <div>
              <label class="block text-slate-700 font-semibold mb-1 text-sm">参加者ID <span class="text-red-500">*</span></label>
              <input type="text" id="p-id" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例: ID001">
            </div>
          </div>
          
          <div id="error-message" class="text-red-500 text-sm mt-4 hidden text-center font-semibold">※参加者IDを入力してください。</div>
        </div>
      `,
      choices: ['実験の説明に進む'],
      button_html: '<button class="custom-btn w-full mt-6">%choice%</button>',
      on_start: function() {
        setTimeout(() => {
          const btn = document.querySelector('.custom-btn');
          if (btn) {
            btn.addEventListener('click', function(e) {
              const idInput = document.getElementById('p-id').value.trim();

              if (!idInput) {
                e.preventDefault();
                e.stopPropagation();
                document.getElementById('error-message').classList.remove('hidden');
              } else {
                participantId = idInput;
              }
            }, true);
          }
        }, 100);
      }
    };
    timeline.push(participant_info_trial);

    // --- 2. 1-Back 教示画面 ---
    const instruction_trial_1back = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 text-left max-w-2xl mx-auto">
          <span class="inline-block bg-blue-100 text-blue-700 text-xs px-3 py-1 rounded-full font-bold mb-3">前半: パート1</span>
          <h2 class="text-2xl font-bold text-slate-800 mb-6 text-left">1-Backテストの説明</h2>
          
          <div class="space-y-4 text-slate-600 text-base leading-relaxed">
            <p>このテストでは、画面中央にアルファベット（A, B, C, D, E）が1つずつ、順番に表示されます。</p>
            <p class="font-semibold text-blue-600 text-lg">あなたの役割は、「今見ている文字」が「1つ前に出た文字」と「同じ」か「違う」かを素早く判断することです。</p>
            
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 my-4 text-sm md:text-base">
              <span class="font-bold text-slate-800">【判断の例】</span>
              <ul class="list-disc list-inside mt-2 space-y-1 text-slate-600">
                <li>1つ目の文字: <strong class="text-slate-800">A</strong> （最初の文字は、比較対象がないので<strong class="text-red-500">「違う」</strong>を選びます）</li>
                <li>2つ目の文字: <strong class="text-slate-800">B</strong> （直前のAと違うので、<strong class="text-red-500">「違う」</strong>を選びます）</li>
                <li>3つ目の文字: <strong class="text-slate-800">B</strong> （直前のBと同じなので、<strong class="text-emerald-600">「同じ」</strong>を選びます）</li>
              </ul>
            </div>

            <p class="text-sm text-slate-500">
              ※ スマートフォンの方は、画面下に表示される緑色の<strong class="text-emerald-600">「同じ」</strong>ボタン、または赤色の<strong class="text-red-500">「違う」</strong>ボタンをタップしてください。<br>
              ※ パソコンの方は、キーボードの <kbd class="px-2 py-0.5 bg-slate-200 rounded font-mono text-xs font-bold">F</kbd> キー（同じ）または <kbd class="px-2 py-0.5 bg-slate-200 rounded font-mono text-xs font-bold">J</kbd> キー（違う）でも回答できます。
            </p>
            
            <p class="text-sm text-slate-500">※ 前半パートは全部で <strong class="text-slate-700 font-semibold">20問</strong> あります。途中で文字が消えても回答可能です。なるべく早く、正確に回答してください。</p>
          </div>
        </div>
      `,
      choices: ['前半戦（1-Back）を開始する'],
      button_html: '<button class="custom-btn px-8 py-3 text-lg mt-6 block mx-auto">%choice%</button>'
    };
    timeline.push(instruction_trial_1back);

    // --- 3. 1-Back 試行ループ ---
    trialSequence1Back.forEach((trialData, index) => {
      const trial = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: function() {
          return `
            <div class="experiment-container">
              <div class="text-slate-400 text-sm tracking-wider font-semibold select-none">
                <span class="inline-block bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-xs mr-2 font-bold">1-Back</span>
                [F / 左] 1つ前と同じ　　[J / 右] 1つ前と違う
              </div>

              <div id="stimulus-letter" class="text-8xl font-black text-slate-800 select-none tracking-normal h-32 flex items-center justify-center transition-opacity duration-100">
                ${trialData.stimulus}
              </div>

              <div class="flex gap-6 w-full max-w-md justify-center px-4">
                <button id="btn-same" class="choice-btn-same flex-1 shadow-md hover:brightness-105 active:scale-95">
                  <span class="block text-xs opacity-80 font-normal">Fキー</span>
                  同じ
                </button>
                <button id="btn-diff" class="choice-btn-diff flex-1 shadow-md hover:brightness-105 active:scale-95">
                  <span class="block text-xs opacity-80 font-normal">Jキー</span>
                  違う
                </button>
              </div>
            </div>
          `;
        },
        choices: ['f', 'j'],
        trial_duration: 2000,
        response_ends_trial: false, // 2000ms 厳格に維持
        
        on_load: function() {
          setTimeout(() => {
            const letterEl = document.getElementById('stimulus-letter');
            if (letterEl) {
              letterEl.style.opacity = '0';
            }
          }, 500);

          const btnSame = document.getElementById('btn-same');
          const btnDiff = document.getElementById('btn-diff');
          
          let responded = false;
          let rt = null;
          let startTime = performance.now();

          function recordResponse(responseType) {
            if (responded) return;
            responded = true;
            rt = performance.now() - startTime;

            if (responseType === 'same') {
              btnSame.classList.add('active-state', 'ring-4', 'ring-emerald-200');
            } else {
              btnDiff.classList.add('active-state', 'ring-4', 'ring-red-200');
            }

            jsPsych.getCurrentTrial().data.manual_response = responseType;
            jsPsych.getCurrentTrial().data.manual_rt = rt;
          }

          btnSame.addEventListener('mousedown', () => recordResponse('same'));
          btnSame.addEventListener('touchstart', (e) => {
            e.preventDefault();
            recordResponse('same');
          });

          btnDiff.addEventListener('mousedown', () => recordResponse('diff'));
          btnDiff.addEventListener('touchstart', (e) => {
            e.preventDefault();
            recordResponse('diff');
          });

          const keyHandler = (e) => {
            if (e.key === 'f' || e.key === 'F') {
              recordResponse('same');
            } else if (e.key === 'j' || e.key === 'J') {
              recordResponse('diff');
            }
          };
          window.addEventListener('keydown', keyHandler);
          jsPsych.getCurrentTrial().data.key_cleanup = () => {
            window.removeEventListener('keydown', keyHandler);
          };
        },

        on_finish: function(data) {
          if (data.key_cleanup) {
            data.key_cleanup();
          }

          let finalResponse = null;
          let finalRt = null;

          if (data.manual_response) {
            finalResponse = data.manual_response;
            finalRt = data.manual_rt;
          } else if (data.response) {
            finalResponse = (data.response === 'f') ? 'same' : 'diff';
            finalRt = data.rt;
          }

          const isTarget = trialData.is_target;
          const correctResponse = isTarget ? 'same' : 'diff';

          let correct = false;
          if (finalResponse !== null) {
            correct = (finalResponse === correctResponse);
          }

          data.participant_id = participantId;
          
          data.condition = '1-back';
          data.trial_no = trialData.trial_index;
          data.stimulus_char = trialData.stimulus;
          data.is_target_cond = isTarget;
          data.user_response = finalResponse;
          data.correct = correct;
          data.rt = finalRt;
        }
      };
      timeline.push(trial);
    });

    // --- 4. 休憩 & 2-Back 教示画面 ---
    const instruction_trial_2back = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 text-left max-w-2xl mx-auto">
          <span class="inline-block bg-amber-100 text-amber-700 text-xs px-3 py-1 rounded-full font-bold mb-3">後半: パート2</span>
          <h2 class="text-2xl font-bold text-slate-800 mb-4">前半終了です。少し休憩してください。</h2>
          <p class="text-slate-600 mb-6 text-sm">深呼吸をして、準備ができたら以下の新しいルールを確認しましょう。</p>
          
          <div class="space-y-4 text-slate-600 text-base leading-relaxed border-t border-slate-100 pt-4">
            <h3 class="text-lg font-bold text-slate-800">【重要】ここからはルールが変わります！</h3>
            <p class="font-semibold text-amber-600 text-lg">これからは「今見ている文字」が「2つ前に出た文字」と「同じ」か「違う」かを判断してください。</p>
            
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 my-4 text-sm md:text-base">
              <span class="font-bold text-slate-800">【2-Back 判断の例】</span>
              <ul class="list-disc list-inside mt-2 space-y-2 text-slate-600">
                <li>1つ目の文字: <strong class="text-slate-800">A</strong> （比較対象がないため<strong class="text-red-500">「違う」</strong>）</li>
                <li>2つ目の文字: <strong class="text-slate-800">B</strong> （比較対象がないため<strong class="text-red-500">「違う」</strong>）</li>
                <li>3つ目の文字: <strong class="text-slate-800">A</strong> （2つ前のAと<strong class="text-emerald-600 font-bold">同じ</strong>なので、<strong class="text-emerald-600 font-bold">「同じ」</strong>を選びます）</li>
                <li>4つ目の文字: <strong class="text-slate-800">C</strong> （2つ前のBと違うので、<strong class="text-red-500">「違う」</strong>を選びます）</li>
              </ul>
            </div>

            <p class="text-sm text-slate-500">
              ※ PCの方は引き続き、キーボードの <kbd class="px-2 py-0.5 bg-slate-200 rounded font-mono text-xs font-bold">F</kbd>（同じ） / <kbd class="px-2 py-0.5 bg-slate-200 rounded font-mono text-xs font-bold">J</kbd>（違う）キーでも回答可能です。<br>
              ※ 後半パートも全部で <strong class="text-slate-700 font-semibold">20問</strong> あります。難易度が上がりますが、焦らず正確に挑戦してください。
            </p>
          </div>
        </div>
      `,
      choices: ['後半戦（2-Back）を開始する'],
      button_html: '<button class="custom-btn bg-amber-600 hover:bg-amber-700 px-8 py-3 text-lg mt-6 block mx-auto">%choice%</button>'
    };
    timeline.push(instruction_trial_2back);

    // --- 5. 2-Back 試行ループ ---
    trialSequence2Back.forEach((trialData, index) => {
      const trial = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: function() {
          return `
            <div class="experiment-container">
              <div class="text-slate-400 text-sm tracking-wider font-semibold select-none">
                <span class="inline-block bg-amber-100 text-amber-800 px-2 py-0.5 rounded text-xs mr-2 font-bold">2-Back</span>
                [F / 左] 2つ前と同じ　　[J / 右] 2つ前と違う
              </div>

              <div id="stimulus-letter" class="text-8xl font-black text-slate-800 select-none tracking-normal h-32 flex items-center justify-center transition-opacity duration-100">
                ${trialData.stimulus}
              </div>

              <div class="flex gap-6 w-full max-w-md justify-center px-4">
                <button id="btn-same" class="choice-btn-same flex-1 shadow-md hover:brightness-105 active:scale-95 bg-amber-600 hover:bg-amber-700">
                  <span class="block text-xs opacity-80 font-normal">Fキー</span>
                  同じ
                </button>
                <button id="btn-diff" class="choice-btn-diff flex-1 shadow-md hover:brightness-105 active:scale-95">
                  <span class="block text-xs opacity-80 font-normal">Jキー</span>
                  違う
                </button>
              </div>
            </div>
          `;
        },
        choices: ['f', 'j'],
        trial_duration: 2000,
        response_ends_trial: false, // 2000ms 厳格に維持
        
        on_load: function() {
          setTimeout(() => {
            const letterEl = document.getElementById('stimulus-letter');
            if (letterEl) {
              letterEl.style.opacity = '0';
            }
          }, 500);

          const btnSame = document.getElementById('btn-same');
          const btnDiff = document.getElementById('btn-diff');
          
          let responded = false;
          let rt = null;
          let startTime = performance.now();

          function recordResponse(responseType) {
            if (responded) return;
            responded = true;
            rt = performance.now() - startTime;

            if (responseType === 'same') {
              btnSame.classList.add('active-state', 'ring-4', 'ring-amber-200');
            } else {
              btnDiff.classList.add('active-state', 'ring-4', 'ring-red-200');
            }

            jsPsych.getCurrentTrial().data.manual_response = responseType;
            jsPsych.getCurrentTrial().data.manual_rt = rt;
          }

          btnSame.addEventListener('mousedown', () => recordResponse('same'));
          btnSame.addEventListener('touchstart', (e) => {
            e.preventDefault();
            recordResponse('same');
          });

          btnDiff.addEventListener('mousedown', () => recordResponse('diff'));
          btnDiff.addEventListener('touchstart', (e) => {
            e.preventDefault();
            recordResponse('diff');
          });

          const keyHandler = (e) => {
            if (e.key === 'f' || e.key === 'F') {
              recordResponse('same');
            } else if (e.key === 'j' || e.key === 'J') {
              recordResponse('diff');
            }
          };
          window.addEventListener('keydown', keyHandler);
          jsPsych.getCurrentTrial().data.key_cleanup = () => {
            window.removeEventListener('keydown', keyHandler);
          };
        },

        on_finish: function(data) {
          if (data.key_cleanup) {
            data.key_cleanup();
          }

          let finalResponse = null;
          let finalRt = null;

          if (data.manual_response) {
            finalResponse = data.manual_response;
            finalRt = data.manual_rt;
          } else if (data.response) {
            finalResponse = (data.response === 'f') ? 'same' : 'diff';
            finalRt = data.rt;
          }

          const isTarget = trialData.is_target;
          const correctResponse = isTarget ? 'same' : 'diff';

          let correct = false;
          if (finalResponse !== null) {
            correct = (finalResponse === correctResponse);
          }

          data.participant_id = participantId;
          
          data.condition = '2-back';
          data.trial_no = trialData.trial_index;
          data.stimulus_char = trialData.stimulus;
          data.is_target_cond = isTarget;
          data.user_response = finalResponse;
          data.correct = correct;
          data.rt = finalRt;
        }
      };
      timeline.push(trial);
    });

    // --- 実験プログラムの実行 ---
    jsPsych.run(timeline);

    // --- GASへのデータ送信処理 ---
    function sendDataToGAS() {
      // 送信中インジケータを表示
      document.getElementById('jspsych-target').innerHTML = `
        <div class="bg-white p-8 rounded-2xl shadow-md border border-slate-200 max-w-md mx-auto text-center">
          <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
          <h3 class="text-xl font-bold text-slate-800 mb-2">データを送信中...</h3>
          <p class="text-slate-500 text-sm">実験データを自動送信して安全に保存しています。<br>このまま少しお待ちください。</p>
        </div>
      `;

      // 必要なトライアルデータのみをフィルタリング・フォーマット
      const rawTrials = jsPsych.data.get().filter({trial_type: 'html-keyboard-response'}).values();
      const payload = rawTrials.map(row => {
        return {
          participant_id: row.participant_id,
          condition: row.condition,
          trial_no: row.trial_no,
          stimulus_char: row.stimulus_char,
          is_target_cond: row.is_target_cond,
          user_response: row.user_response,
          correct: row.correct,
